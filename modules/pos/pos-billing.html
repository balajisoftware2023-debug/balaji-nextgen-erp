<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>POS Billing | Balaji NextGen ERP</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Poppins',sans-serif;
background:#eef5f7;
display:flex;
min-height:100vh;

}

/* SIDEBAR */

.sidebar{

width:250px;
background:#dce9ec;
padding:18px;
border-right:1px solid #cbd5e1;

}

.logo{

display:flex;
align-items:center;
gap:12px;
margin-bottom:25px;

}

.logo img{

width:58px;
height:58px;
border-radius:14px;
background:white;
padding:5px;

}

.logo h2{

font-size:19px;
line-height:1.3;

}

.logo span{
color:#2563eb;
}

.nav a{

display:flex;
align-items:center;
gap:12px;

padding:13px;
margin-bottom:12px;

border-radius:14px;

background:linear-gradient(
135deg,
#172033,
#0f172a
);

color:white;
text-decoration:none;
font-weight:600;

transition:.3s;

}

.nav a:hover,
.nav a.active{

background:linear-gradient(
135deg,
#2563eb,
#1d4ed8
);

}

/* MAIN */

.main{

flex:1;
padding:20px;

}

/* TOPBAR */

.topbar{

background:linear-gradient(
135deg,
#2563eb,
#1d4ed8
);

padding:18px 22px;

border-radius:20px;

display:flex;
justify-content:space-between;
align-items:center;

color:white;

margin-bottom:22px;

}

.topbar h1{

font-size:26px;

}

.live-clock{

background:white;
color:#111827;

padding:10px 16px;

border-radius:12px;

font-weight:700;

}

/* POS GRID */

.pos-grid{

display:grid;

grid-template-columns:2fr 1fr;

gap:20px;

}

/* MENU SECTION */

.menu-section{

background:white;

padding:20px;

border-radius:18px;

box-shadow:
0 5px 18px rgba(0,0,0,.06);

}

/* SEARCH */

.search-box{

margin-bottom:20px;

}

.search-box input{

width:100%;
padding:14px;

border:1px solid #cbd5e1;
border-radius:12px;

font-size:14px;

}

/* MENU GRID */

.menu-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(180px,1fr));

gap:18px;

}

.menu-card{

background:#f8fafc;

border-radius:16px;

overflow:hidden;

transition:.3s;

border:1px solid #e2e8f0;

}

.menu-card:hover{

transform:translateY(-4px);

}

.menu-card img{

width:100%;
height:150px;
object-fit:cover;

}

.menu-content{

padding:14px;

}

.menu-content h3{

font-size:16px;
margin-bottom:8px;

}

.price{

font-size:18px;
font-weight:700;
color:#2563eb;

margin-bottom:12px;

}

.add-btn{

width:100%;

padding:11px;

border:none;

border-radius:10px;

background:linear-gradient(
135deg,
#10b981,
#059669
);

color:white;
font-weight:700;
cursor:pointer;

}

/* BILL SECTION */

.bill-section{

background:white;

padding:20px;

border-radius:18px;

box-shadow:
0 5px 18px rgba(0,0,0,.06);

display:flex;
flex-direction:column;

}

.bill-title{

font-size:22px;
font-weight:700;

margin-bottom:18px;

}

.bill-items{

flex:1;

margin-bottom:20px;

}

.bill-row{

display:flex;
justify-content:space-between;

padding:12px 0;

border-bottom:1px solid #e5e7eb;

font-size:14px;

}

.total-box{

background:#eff6ff;

padding:18px;

border-radius:14px;

margin-bottom:18px;

}

.total-box h2{

font-size:26px;
color:#2563eb;

}

.bill-actions{

display:grid;

grid-template-columns:1fr 1fr;

gap:12px;

}

.action-btn{

padding:13px;

border:none;

border-radius:12px;

font-weight:700;
cursor:pointer;

color:white;

}

.print-btn{
background:#2563eb;
}

.pay-btn{
background:#10b981;
}

/* RESPONSIVE */

@media(max-width:992px){

.pos-grid{

grid-template-columns:1fr;

}

}

@media(max-width:768px){

.sidebar{
display:none;
}

body{
display:block;
}

}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">

<img
src="../assets/logos/logo.png"
alt="ERP Logo">

<h2>

BALAJI
<span>NEXTGEN</span>
POS ERP

</h2>

</div>

<div class="nav">

<a href="restaurant-dashboard.html">
🏠 Dashboard
</a>

<a href="pos-billing.html" class="active">
🧾 POS Billing
</a>

<a href="nextgen_restro_erp_professional_pos_TableManagement.html">
🪑 Tables
</a>

<a href="kitchen-display.html">
👨‍🍳 Kitchen Display
</a>

<a href="../reports/reports-dashboard.html">
📊 Reports
</a>

<a href="../settings/erp-preferences.html">
⚙ Settings
</a>

</div>

</div>

<!-- MAIN -->

<div class="main">

<!-- TOPBAR -->

<div class="topbar">

<h1>
🧾 POS Billing
</h1>

<div
class="live-clock"
id="liveClock">

00:00:00

</div>

</div>

<!-- POS GRID -->

<div class="pos-grid">

<!-- MENU -->

<div class="menu-section">

<div class="search-box">

<input
type="text"
placeholder="Search Menu Item...">

</div>

<div class="menu-grid">

<!-- ITEM -->

<div class="menu-card">

<img
src="https://images.unsplash.com/photo-1513104890138-7c749659a591"
alt="Pizza">

<div class="menu-content">

<h3>
Veg Pizza
</h3>

<div class="price">
₹299
</div>

<button
class="add-btn"
onclick="addItem('Veg Pizza',299)">

ADD

</button>

</div>

</div>

<!-- ITEM -->

<div class="menu-card">

<img
src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd"
alt="Burger">

<div class="menu-content">

<h3>
Burger
</h3>

<div class="price">
₹149
</div>

<button
class="add-btn"
onclick="addItem('Burger',149)">

ADD

</button>

</div>

</div>

<!-- ITEM -->

<div class="menu-card">

<img
src="https://images.unsplash.com/photo-1559847844-5315695dadae"
alt="Coffee">

<div class="menu-content">

<h3>
Coffee
</h3>

<div class="price">
₹99
</div>

<button
class="add-btn"
onclick="addItem('Coffee',99)">

ADD

</button>

</div>

</div>

</div>

</div>

<!-- BILL -->

<div class="bill-section">

<div class="bill-title">

🧾 Current Bill

</div>

<div
class="bill-items"
id="billItems">

<div class="bill-row">

<span>
No items added
</span>

</div>

</div>

<div class="total-box">

<p>
Total Amount
</p>

<h2 id="billTotal">
₹0
</h2>

</div>

<div class="bill-actions">

<button
class="action-btn print-btn">

🖨 Print

</button>

<button
class="action-btn pay-btn">

💳 Pay

</button>

</div>

</div>

</div>

</div>

<script>

/* LIVE CLOCK */

setInterval(()=>{

document.getElementById(
"liveClock"
).innerHTML=
new Date().toLocaleTimeString();

},1000);

/* BILLING */

let total=0;

function addItem(name,price){

total+=price;

document.getElementById(
"billTotal"
).innerHTML=
"₹"+total;

document.getElementById(
"billItems"
).innerHTML+=`

<div class="bill-row">

<span>${name}</span>

<span>₹${price}</span>

</div>

`;

}

</script>

</body>
</html>
