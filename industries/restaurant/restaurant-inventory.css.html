<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{

  background:#f1f5f9;

  overflow-x:hidden;

  color:#0f172a;

}

/* =====================================================
   PAGE
===================================================== */

.restaurant-inventory-page{

  padding:24px;

  min-height:100vh;

}

/* =====================================================
   TOPBAR
===================================================== */

.inventory-topbar{

  background:white;

  border-radius:28px;

  padding:24px;

  display:flex;

  justify-content:space-between;

  align-items:center;

  gap:20px;

  box-shadow:
  0 10px 30px rgba(0,0,0,.05);

}

.top-left h1{

  font-size:38px;

  font-weight:800;

}

.top-left p{

  margin-top:8px;

  color:#64748b;

}

.top-right{

  display:flex;

  gap:14px;

  flex-wrap:wrap;

}

/* =====================================================
   ACTION BUTTONS
===================================================== */

.action-btn{

  border:none;

  padding:14px 20px;

  border-radius:16px;

  color:white;

  font-size:14px;

  font-weight:700;

  cursor:pointer;

  transition:.3s;

}

.action-btn:hover{

  transform:translateY(-2px);

}

.add-btn{

  background:#2563eb;

}

.inward-btn{

  background:#10b981;

}

.outward-btn{

  background:#f97316;

}

.export-btn{

  background:#7c3aed;

}

/* =====================================================
   KPI GRID
===================================================== */

.kpi-grid{

  margin-top:24px;

  display:grid;

  grid-template-columns:
  repeat(4,1fr);

  gap:22px;

}

/* =====================================================
   KPI CARD
===================================================== */

.kpi-card{

  border-radius:28px;

  padding:24px;

  color:white;

  box-shadow:
  0 10px 24px rgba(0,0,0,.08);

}

.kpi-card span{

  font-size:14px;

  opacity:.9;

}

.kpi-card h2{

  margin-top:12px;

  font-size:40px;

  font-weight:900;

}

.kpi-card p{

  margin-top:10px;

  font-size:13px;

}

.stock-card{

  background:
  linear-gradient(
    135deg,
    #2563eb,
    #1d4ed8
  );

}

.low-card{

  background:
  linear-gradient(
    135deg,
    #f59e0b,
    #d97706
  );

}

.out-card{

  background:
  linear-gradient(
    135deg,
    #ef4444,
    #dc2626
  );

}

.consume-card{

  background:
  linear-gradient(
    135deg,
    #10b981,
    #059669
  );

}

/* =====================================================
   FILTER SECTION
===================================================== */

.filter-section{

  margin-top:24px;

  background:white;

  border-radius:24px;

  padding:20px;

  display:grid;

  grid-template-columns:
  repeat(5,1fr);

  gap:16px;

  box-shadow:
  0 10px 30px rgba(0,0,0,.05);

}

.filter-section select,
.filter-section input{

  height:56px;

  border:1px solid #cbd5e1;

  border-radius:16px;

  padding:0 16px;

  font-size:14px;

}

/* =====================================================
   TABLE CARD
===================================================== */

.inventory-table-card{

  margin-top:24px;

  background:white;

  border-radius:28px;

  padding:24px;

  overflow-x:auto;

  box-shadow:
  0 10px 30px rgba(0,0,0,.05);

}

.table-title{

  font-size:24px;

  font-weight:800;

  margin-bottom:24px;

}

/* =====================================================
   INVENTORY TABLE
===================================================== */

.inventory-table{

  min-width:1200px;

}

.inventory-header{

  display:grid;

  grid-template-columns:
  2fr 1.2fr .7fr .8fr .8fr .8fr .8fr .8fr 1fr 1fr;

  gap:14px;

  padding:18px;

  border-radius:18px;

  background:#eff6ff;

  font-weight:800;

  color:#2563eb;

}

.inventory-row{

  display:grid;

  grid-template-columns:
  2fr 1.2fr .7fr .8fr .8fr .8fr .8fr .8fr 1fr 1fr;

  gap:14px;

  padding:18px;

  align-items:center;

  border-bottom:1px solid #e2e8f0;

}

/* =====================================================
   STATUS ROWS
===================================================== */

.normal-stock{

  background:#f0fdf4;

}

.low-stock{

  background:#fffbeb;

}

.out-stock{

  background:#fef2f2;

}

/* =====================================================
   BADGES
===================================================== */

.status-badge{

  padding:8px 14px;

  border-radius:14px;

  color:white;

  font-size:12px;

  font-weight:700;

}

.normal-badge{

  background:#16a34a;

}

.low-badge{

  background:#d97706;

}

.out-badge{

  background:#dc2626;

}

/* =====================================================
   MODULE GRID
===================================================== */

.module-grid{

  margin-top:24px;

  display:grid;

  grid-template-columns:
  repeat(4,1fr);

  gap:22px;

}

/* =====================================================
   MODULE CARD
===================================================== */

.module-card{

  background:white;

  border-radius:24px;

  padding:24px;

  box-shadow:
  0 10px 30px rgba(0,0,0,.05);

}

.module-card h3{

  font-size:22px;

  margin-bottom:14px;

}

.module-card p{

  color:#64748b;

  line-height:1.7;

}

/* =====================================================
   RESPONSIVE
===================================================== */

@media(max-width:1400px){

  .kpi-grid{

    grid-template-columns:
    repeat(2,1fr);

  }

  .module-grid{

    grid-template-columns:
    repeat(2,1fr);

  }

}

@media(max-width:1200px){

  .filter-section{

    grid-template-columns:
    repeat(2,1fr);

  }

}

@media(max-width:768px){

  .inventory-topbar{

    flex-direction:column;

    align-items:flex-start;

  }

  .filter-section{

    grid-template-columns:1fr;

  }

  .kpi-grid{

    grid-template-columns:1fr;

  }

  .module-grid{

    grid-template-columns:1fr;

  }

}

</style>
