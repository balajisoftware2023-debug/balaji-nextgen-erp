<!DOCTYPE html>
<html>

<head>

  <title>
    PURCHASE ENTRY DASHBOARD
  </title>

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#f3f4f6;
      padding:20px;
    }

    .container{
      max-width:1700px;
      margin:auto;
    }

    .top-bar{
      background:linear-gradient(135deg,#1e3a8a,#2563eb);
      color:#fff;
      padding:25px;
      border-radius:20px;
      margin-bottom:20px;
    }

    .top-bar h1{
      font-size:32px;
    }

    .stats-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
      margin-bottom:25px;
    }

    .card{
      background:#fff;
      padding:22px;
      border-radius:18px;
      box-shadow:0 4px 10px rgba(0,0,0,0.08);
    }

    .card-title{
      color:#6b7280;
      font-size:15px;
      margin-bottom:12px;
    }

    .card-value{
      font-size:34px;
      font-weight:bold;
      color:#111827;
    }

    .section{
      background:#fff;
      padding:22px;
      border-radius:18px;
      margin-bottom:20px;
      box-shadow:0 4px 10px rgba(0,0,0,0.08);
    }

    .section-title{
      font-size:24px;
      margin-bottom:20px;
      font-weight:bold;
      color:#111827;
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    table th{
      background:#1d4ed8;
      color:#fff;
      padding:14px;
      text-align:left;
    }

    table td{
      padding:14px;
      border-bottom:1px solid #e5e7eb;
    }

    .status{
      padding:6px 12px;
      border-radius:20px;
      font-size:12px;
      color:#fff;
      font-weight:bold;
    }

    .pending{
      background:#f59e0b;
    }

    .success{
      background:#10b981;
    }

    .review{
      background:#6366f1;
    }

    .btn{
      border:none;
      padding:10px 14px;
      border-radius:10px;
      cursor:pointer;
      color:#fff;
      background:#2563eb;
      font-weight:bold;
    }

    .upload-section{
      display:flex;
      gap:15px;
      align-items:center;
      flex-wrap:wrap;
    }

    input[type=file]{
      padding:12px;
      border:1px solid #d1d5db;
      border-radius:10px;
      background:#fff;
    }

  </style>

</head>

<body>

<div class="container">

  <div class="top-bar">

    <h1>
      PURCHASE ENTRY DASHBOARD
    </h1>

    <p>
      Live OCR Purchase Automation Control Center
    </p>

  </div>



  <div class="stats-grid">

    <div class="card">

      <div class="card-title">
        Total OCR Uploads
      </div>

      <div
        class="card-value"
        id="totalUploads"
      >
        0
      </div>

    </div>



    <div class="card">

      <div class="card-title">
        Pending Queue
      </div>

      <div
        class="card-value"
        id="queueCount"
      >
        0
      </div>

    </div>



    <div class="card">

      <div class="card-title">
        Purchase Drafts
      </div>

      <div class="card-value">
        LIVE
      </div>

    </div>



    <div class="card">

      <div class="card-title">
        OCR Status
      </div>

      <div class="card-value">
        ACTIVE
      </div>

    </div>

  </div>



  <div class="section">

    <div class="section-title">

      Upload Purchase Invoice

    </div>



    <div class="upload-section">

      <input
        type="file"
        id="invoiceFile"
      >



      <button
        class="btn"
        onclick="uploadInvoice()"
      >

        START OCR UPLOAD

      </button>

    </div>

  </div>



  <div class="section">

    <div class="section-title">

      OCR Processing Queue

    </div>

    <table>

      <thead>

        <tr>

          <th>Upload ID</th>
          <th>File Name</th>
          <th>Status</th>
          <th>Action</th>

        </tr>

      </thead>

      <tbody id="queueTable">

      </tbody>

    </table>

  </div>

</div>



<script>

const API_URL =

  "YOUR_API_URL";



/* =====================================================
   LOAD DASHBOARD
===================================================== */

async function loadDashboard(){

  try {

    const response =
      await fetch(

        API_URL +

        "?action=GET_DASHBOARD"

      );



    const data =
      await response.json();



    document.getElementById(
      "totalUploads"
    ).innerText =

      data.dashboard.totalUploads;



    document.getElementById(
      "queueCount"
    ).innerText =

      data.dashboard.queueCount;



    loadQueue();

  }

  catch(error){

    console.log(error);

  }

}




/* =====================================================
   LOAD OCR QUEUE
===================================================== */

async function loadQueue(){

  try {

    const response =
      await fetch(

        API_URL +

        "?action=GET_QUEUE"

      );



    const data =
      await response.json();



    let html = "";



    data.queue.forEach(row => {

      html += `

        <tr>

          <td>${row.uploadId}</td>

          <td>${row.fileName}</td>

          <td>

            <span class="status pending">

              ${row.status}

            </span>

          </td>

          <td>

            <button
              class="btn"
            >

              VIEW

            </button>

          </td>

        </tr>

      `;

    });



    document.getElementById(
      "queueTable"
    ).innerHTML = html;

  }

  catch(error){

    console.log(error);

  }

}




/* =====================================================
   UPLOAD INVOICE
===================================================== */

async function uploadInvoice(){

  try {

    const file =
      document.getElementById(
        "invoiceFile"
      ).files[0];



    if(!file){

      alert(
        "Select File"
      );

      return;

    }



    const reader =
      new FileReader();



    reader.onload = async function(){

      const base64 =
        reader.result
        .split(",")[1];



      const payload = {

        action:
          "UPLOAD_OCR_FILE",

        data: {

          fileName:
            file.name,

          contentType:
            file.type,

          base64:
            base64,

          client:
            "VANNS_KITCHEN",

          branch:
            "MAIN_BRANCH"

        }

      };



      const response =
        await fetch(

          API_URL,

          {

            method:
              "POST",

            body:
              JSON.stringify(
                payload
              )

          }

        );



      const result =
        await response.json();



      alert(

        "UPLOAD SUCCESS : "

        +

        result.uploadId

      );



      loadDashboard();

    };



    reader.readAsDataURL(
      file
    );

  }

  catch(error){

    console.log(error);

  }

}




/* =====================================================
   AUTO LOAD
===================================================== */

loadDashboard();

</script>

</body>
</html>
