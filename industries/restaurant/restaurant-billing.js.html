/* =====================================================
   PAYMENT BUTTONS
===================================================== */

function initializePaymentButtons(){

  const buttons =
    document.querySelectorAll(
      ".payment-btn"
    );

  buttons.forEach(function(btn){

    btn.addEventListener(
      "click",
      function(){

        buttons.forEach(function(b){

          b.classList.remove(
            "active"
          );

        });

        btn.classList.add(
          "active"
        );

        ACTIVE_PAYMENT =
          btn.innerText.trim();

        showToast(
          ACTIVE_PAYMENT +
          " Selected"
        );

      }
    );

  });

}

/* =====================================================
   SHOW TOAST
===================================================== */

function showToast(message){

  const toast =
    document.createElement(
      "div"
    );

  toast.innerHTML =
    message;

  toast.style.position =
    "fixed";

  toast.style.bottom =
    "30px";

  toast.style.right =
    "30px";

  toast.style.background =
    "#0f172a";

  toast.style.color =
    "white";

  toast.style.padding =
    "16px 22px";

  toast.style.borderRadius =
    "16px";

  toast.style.fontWeight =
    "700";

  toast.style.zIndex =
    "99999";

  toast.style.boxShadow =
    "0 10px 25px rgba(0,0,0,.2)";

  document.body.appendChild(
    toast
  );

  setTimeout(function(){

    toast.remove();

  },2000);
