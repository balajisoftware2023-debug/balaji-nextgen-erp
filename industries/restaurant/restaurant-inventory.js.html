<script>

/* =====================================================
   BALAJI NEXTGEN ERP
   RESTAURANT INVENTORY ENGINE
===================================================== */

/* =====================================================
   GLOBAL VARIABLES
===================================================== */

let INVENTORY_DATA = [];

let AUTO_REFRESH = null;

/* =====================================================
   PAGE LOAD
===================================================== */

window.onload = function(){

  initializeInventory();

};

/* =====================================================
   INITIALIZE
===================================================== */

function initializeInventory(){

  initializeButtons();

  initializeFilters();

  loadInventory();

  startAutoRefresh();

  console.log(
    "INVENTORY ENGINE LOADED"
  );

}

/* =====================================================
   BUTTONS
===================================================== */

function initializeButtons(){

  initializeAddButton();

  initializeInwardButton();

  initializeOutwardButton();

  initializeExportButton();

}

/* =====================================================
   ADD ITEM
===================================================== */

function initializeAddButton(){

  const button =
    document.querySelector(
      ".add-btn"
    );

  if(!button) return;

  button.addEventListener(
    "click",
    function(){

      addInventoryItem();

    }
  );

}

function addInventoryItem(){

  showToast(
    "Add Item Window Opened"
  );

  console.log(
    "ADD INVENTORY ITEM"
  );

}

/* =====================================================
   STOCK INWARD
===================================================== */

function initializeInwardButton(){

  const button =
    document.querySelector(
      ".inward-btn"
    );

  if(!button) return;

  button.addEventListener(
    "click",
    function(){

      stockInward();

    }
  );

}

function stockInward(){

  showToast(
    "Stock Inward Started"
  );

  console.log(
    "STOCK INWARD"
  );

}

/* =====================================================
   STOCK OUTWARD
===================================================== */

function initializeOutwardButton(){

  button.addEventListener(

    "Stock Outward Started"
  );

  console.log(
    "STOCK OUTWARD"
  );

/* =====================================================
   EXPORT EXCEL
===================================================== */

function initializeExportButton(){

  const button =
    document.querySelector(
      ".export-btn"
    );

  if(!button) return;

  button.addEventListener(
    "click",
    function(){

      exportInventoryExcel();

    }
  );

}

function exportInventoryExcel(){

  showToast(
    "Excel Export Started"
  );

  console.log(
    "EXPORT INVENTORY EXCEL"
  );

}

/* =====================================================
   FILTERS
===================================================== */

function initializeFilters(){

  const filters =
    document.querySelectorAll(
      ".filter-section select, .filter-section input"
    );

  filters.forEach(function(filter){

    filter.addEventListener(
      "change",
      function(){

        applyFilters();

      }
    );

  });

}

function applyFilters(){

  showToast(
    "Inventory Filters Applied"
  );

  console.log(
    "APPLY INVENTORY FILTERS"
  );

  loadInventory();

}

  INVENTORY_DATA = data;

  console.log(

/* =====================================================
   AUTO REFRESH
===================================================== */

function startAutoRefresh(){

  AUTO_REFRESH =
    setInterval(function(){

      loadInventory();

      console.log(
        "AUTO REFRESH INVENTORY"
      );

    },60000);

}

/* =====================================================
   TOAST
===================================================== */

function showToast(message){

  const toast =
    document.createElement(
      "div"
    );

  toast.innerHTML =
    message;

  toast.style.position =
    "fixed";

  toast.style.bottom =
    "30px";

  toast.style.right =
    "30px";

  toast.style.background =
    "#0f172a";

  toast.style.color =
    "white";

  toast.style.padding =
    "16px 22px";

  toast.style.borderRadius =
    "16px";

  toast.style.fontWeight =
    "700";

  toast.style.zIndex =
    "99999";

  toast.style.boxShadow =
    "0 10px 25px rgba(0,0,0,.2)";

  document.body.appendChild(
    toast
  );

  setTimeout(function(){

    toast.remove();

  },2000);

}

</script>
