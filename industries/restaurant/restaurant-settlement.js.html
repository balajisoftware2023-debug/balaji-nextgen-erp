<script>

/* =====================================================
   BALAJI NEXTGEN ERP
   RESTAURANT SETTLEMENT ENGINE
===================================================== */

/* =====================================================
   GLOBAL VARIABLES
===================================================== */

let ACTIVE_PAYMENT = "CASH";

let SETTLEMENT_DATA = {

  cash : 0,

  card : 0,

  upi : 0,

  wallet : 0,

  credit : 0

};

/* =====================================================
   PAGE LOAD
===================================================== */

window.onload = function(){

  initializeSettlement();

};

/* =====================================================
   INITIALIZE
===================================================== */

function initializeSettlement(){

  initializePaymentButtons();

  initializeActionButtons();

  initializeInputs();

  calculateSettlement();

  console.log(
    "SETTLEMENT ENGINE LOADED"
  );

}

/* =====================================================
   PAYMENT BUTTONS
===================================================== */

function initializePaymentButtons(){

  const buttons =
    document.querySelectorAll(
      ".payment-btn"
    );

  buttons.forEach(function(btn){

    btn.addEventListener(
      "click",
      function(){

        buttons.forEach(function(b){

          b.classList.remove(
            "active"
          );

        });

        btn.classList.add(
          "active"
        );

        ACTIVE_PAYMENT =
          btn.innerText.trim();

        showToast(
          ACTIVE_PAYMENT +
          " Selected"
        );

      }
    );

  });

}

/* =====================================================
   INPUT EVENTS
===================================================== */

function initializeInputs(){

  const inputs =
    document.querySelectorAll(
      ".payment-inputs input"
    );

  inputs.forEach(function(input){

    input.addEventListener(
      "keyup",
      function(){

        calculateSettlement();

      }
    );

  });

}

/* =====================================================
   ACTION BUTTONS
===================================================== */

function initializeActionButtons(){

  initializeConfirmButton();

  initializePrintButton();

  initializeSaveButton();

  initializeCancelButton();

}

/* =====================================================
   CONFIRM PAYMENT
===================================================== */

function initializeConfirmButton(){

  const button =
    document.querySelector(
      ".confirm-btn"
    );

  if(!button) return;

  button.addEventListener(
    "click",
    function(){

      confirmSettlement();

    }
  );

}

function confirmSettlement(){

  showToast(
    "Payment Confirmed"
  );

  console.log(
    "CONFIRM PAYMENT"
  );

}

/* =====================================================
   PRINT RECEIPT
===================================================== */

function initializePrintButton(){

  const button =
    document.querySelector(
      ".print-btn"
    );

  if(!button) return;

  button.addEventListener(
    "click",
    function(){

      printReceipt();

    }
  );

}

function printReceipt(){

  window.print();

}

/* =====================================================
   SAVE SETTLEMENT
===================================================== */

function initializeSaveButton(){

  const button =
    document.querySelector(
      ".save-btn"
    );

  if(!button) return;

  button.addEventListener(
    "click",
    function(){

      saveSettlement();

    }
  );

}

function saveSettlement(){

  showToast(
    "Settlement Saved"
  );

  console.log(
    "SAVE SETTLEMENT"
  );

  /*
  google.script.run
    .withSuccessHandler(
      function(response){

      }
    )
    .saveSettlement(
      SETTLEMENT_DATA
    );
  */

}

/* =====================================================
   CANCEL
===================================================== */

function initializeCancelButton(){

  const button =
    document.querySelector(
      ".cancel-btn"
    );

  if(!button) return;

  button.addEventListener(
    "click",
    function(){

      cancelSettlement();

    }
  );

}

function cancelSettlement(){

  if(

    confirm(
      "Cancel Settlement?"
    )

  ){

    showToast(
      "Settlement Cancelled"
    );

    console.log(
      "CANCEL SETTLEMENT"
    );

  }

}

   CALCULATE
===================================================== */

function calculateSettlement(){

  console.log(
    "CALCULATE SETTLEMENT"
  );

}

/* =====================================================

function processSplitPayment(){

  console.log(
    "SPLIT PAYMENT"
  );

}

/* =====================================================
   VALIDATE PAYMENT
===================================================== */

function validatePayment(){

  console.log(
    "VALIDATE PAYMENT"
  );

}

/* =====================================================
   GENERATE RECEIPT
===================================================== */

function generateReceipt(){

  console.log(
    "GENERATE RECEIPT"
  );

}

/* =====================================================
   LOAD BILL DATA
===================================================== */

function loadSettlementBill(){

  console.log(
    "LOAD BILL"
  );

}

/* =====================================================
   TOAST
===================================================== */

function showToast(message){

  const toast =
    document.createElement(
      "div"
    );

  toast.innerHTML =
    message;

  toast.style.position =
    "fixed";

  toast.style.bottom =
    "30px";

  toast.style.right =
    "30px";

  toast.style.background =
    "#0f172a";

  toast.style.color =
    "white";

  toast.style.padding =
    "16px 22px";

  toast.style.borderRadius =
    "16px";

  toast.style.fontWeight =
    "700";

  toast.style.zIndex =
    "99999";

  toast.style.boxShadow =
    "0 10px 25px rgba(0,0,0,.2)";

  document.body.appendChild(
    toast
  );

  setTimeout(function(){

    toast.remove();

  },2000);

}

</script>
