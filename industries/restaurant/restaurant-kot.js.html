<script>

/* =====================================================
   BALAJI NEXTGEN ERP
   RESTAURANT KOT ENGINE
===================================================== */

/* =====================================================
   GLOBAL VARIABLES
===================================================== */

let PENDING_COUNT = 12;

let PREPARING_COUNT = 8;

let READY_COUNT = 6;

let DELAYED_COUNT = 2;

/* =====================================================
   PAGE LOAD
===================================================== */

window.onload = function(){

  initializeKOT();

};

/* =====================================================
   INITIALIZE
===================================================== */

function initializeKOT(){

  initializePrepareButtons();

  initializeReadyButtons();

  initializeServedButtons();

  startRealtimeClock();

  monitorDelayedOrders();

  console.log(
    "KOT ENGINE LOADED"
  );

}

/* =====================================================
   PREPARE BUTTONS
===================================================== */

function initializePrepareButtons(){

  const buttons =
    document.querySelectorAll(
      ".prepare-btn"
    );

  buttons.forEach(function(btn){

    btn.addEventListener(
      "click",
      function(){

        const card =
          btn.closest(
            ".kot-card"
          );

        moveToPreparing(
          card
        );

      }
    );

  });

}

/* =====================================================
   READY BUTTONS
===================================================== */

function initializeReadyButtons(){

  const buttons =
    document.querySelectorAll(
      ".ready-btn"
    );

  buttons.forEach(function(btn){

    btn.addEventListener(
      "click",
      function(){

        const card =
          btn.closest(
            ".kot-card"
          );

        moveToReady(
          card
        );

      }
    );

  });

}

/* =====================================================
   SERVED BUTTONS
===================================================== */

function initializeServedButtons(){

  const buttons =
    document.querySelectorAll(
      ".served-btn"
    );

  buttons.forEach(function(btn){

    btn.addEventListener(
      "click",
      function(){

        const card =
          btn.closest(
            ".kot-card"
          );

        markAsServed(
          card
        );

      }
    );

  });

}

/* =====================================================
   MOVE TO PREPARING
===================================================== */

function moveToPreparing(card){

  showToast(
    "Moved To Preparing"
  );

  card.style.opacity = ".7";

  setTimeout(function(){

    card.remove();

  },600);

}

/* =====================================================
   MOVE TO READY
===================================================== */

function moveToReady(card){

  showToast(
    "Order Ready"
  );

  card.style.opacity = ".7";

  setTimeout(function(){

    card.remove();

  },600);

}

/* =====================================================
   MARK AS SERVED
===================================================== */

function markAsServed(card){

  showToast(
    "Order Served"
  );

  card.style.opacity = ".4";

  setTimeout(function(){

    card.remove();

  },600);

}

/* =====================================================
   REALTIME CLOCK
===================================================== */

function startRealtimeClock(){

  setInterval(function(){

    console.log(
      "LIVE KOT REFRESH"
    );

  },10000);

}

/* =====================================================
   DELAY MONITOR
===================================================== */

function monitorDelayedOrders(){

  setInterval(function(){

    const cards =
      document.querySelectorAll(
        ".pending-card"
      );

    cards.forEach(function(card){

      const badge =
        card.querySelector(
          ".kot-card-top span"
        );

      if(!badge) return;

      const text =
        badge.innerText;

      const mins =
        parseInt(text);

      if(mins >= 10){

        card.style.border =
          "4px solid #dc2626";

        card.style.animation =
          "pulse 1s infinite";

      }

    });

  },5000);

}

/* =====================================================
   SOUND ALERT
===================================================== */

function playAlertSound(){

  console.log(
    "PLAY ALERT"
  );

}

/* =====================================================
   REFRESH KOT
===================================================== */

function refreshKOTBoard(){

  console.log(
    "REFRESH KOT BOARD"
  );

}

/* =====================================================
   UPDATE COUNTS
===================================================== */

function updateCounts(){

  console.log(
    "UPDATE COUNTS"
  );

}

/* =====================================================
   LOAD LIVE ORDERS
===================================================== */

function loadLiveOrders(){

  console.log(
    "LOAD LIVE KOT"
  );

}

/* =====================================================
   SAVE KOT STATUS
===================================================== */

function saveKOTStatus(){

  console.log(
    "SAVE KOT STATUS"
  );

}

/* =====================================================
   TOAST MESSAGE
===================================================== */

function showToast(message){

  const toast =
    document.createElement(
      "div"
    );

  toast.innerHTML =
    message;

  toast.style.position =
    "fixed";

  toast.style.right =
    "30px";

  toast.style.bottom =
    "30px";

  toast.style.background =
    "#0f172a";

  toast.style.color =
    "white";

  toast.style.padding =
    "16px 22px";

  toast.style.borderRadius =
    "16px";

  toast.style.fontWeight =
    "700";

  toast.style.zIndex =
    "99999";

  document.body.appendChild(
    toast
  );

  setTimeout(function(){

    toast.remove();

  },2000);

}

/* =====================================================
   PULSE ANIMATION
===================================================== */

const style =
  document.createElement(
    "style"
  );

style.innerHTML =

`
@keyframes pulse{

  0%{
    transform:scale(1);
  }

  50%{
    transform:scale(1.02);
  }

  100%{
    transform:scale(1);
  }

}
`;

document.head.appendChild(
  style
);

</script>
