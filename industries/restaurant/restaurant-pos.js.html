<script>

/* =====================================================
   BALAJI NEXTGEN ERP
   RESTAURANT POS ENGINE
===================================================== */

/* =====================================================
   GLOBAL VARIABLES
===================================================== */

let POS_CART = [];

let ACTIVE_TABLE = "T5";

let ACTIVE_PAYMENT = "CASH";

/* =====================================================
   PAGE LOAD
===================================================== */

window.onload = function(){

  initializePOS();

};

/* =====================================================
   INITIALIZE POS
===================================================== */

function initializePOS(){

  initializeCategoryButtons();

  initializeMenuButtons();

  initializePaymentButtons();

  initializeTableSelection();

  initializeSettlementModal();

  updateClock();

  setInterval(
    updateClock,
    1000
  );

  console.log(
    "RESTAURANT POS LOADED"
  );

}

/* =====================================================
   LIVE CLOCK
===================================================== */

function updateClock(){

  const clock =
    document.getElementById(
      "liveClock"
    );

  if(clock){

    clock.innerHTML =
      new Date()
      .toLocaleTimeString();

  }

}

/* =====================================================
   CATEGORY BUTTONS
===================================================== */

function initializeCategoryButtons(){

  const buttons =
    document.querySelectorAll(
      ".category-btn"
    );

  buttons.forEach(function(btn){

    btn.addEventListener(
      "click",
      function(){

        buttons.forEach(function(b){

          b.classList.remove(
            "active"
          );

        });

        btn.classList.add(
          "active"
        );

      }
    );

  });

}

/* =====================================================
   MENU ADD BUTTONS
===================================================== */

function initializeMenuButtons(){

  const buttons =
    document.querySelectorAll(
      ".add-btn"
    );

  buttons.forEach(function(btn){

    btn.addEventListener(
      "click",
      function(){

        const card =
          btn.closest(
            ".menu-card"
          );

        const itemName =
          card.querySelector(
            "h3"
          ).innerText;

        const itemPrice =
          parseFloat(

            card.querySelector(
              "h2"
            )

            .innerText

            .replace("₹","")

          );

        addItemToCart(
          itemName,
          itemPrice
        );

      }
    );

  });

}

/* =====================================================
   ADD ITEM TO CART
===================================================== */

function addItemToCart(

  itemName,
  itemPrice

){

  POS_CART.push({

    name:itemName,

    price:itemPrice,

    qty:1

  });

  showToast(
    itemName +
    " Added"
  );

  updateCartUI();

}

/* =====================================================
   UPDATE CART UI
===================================================== */

function updateCartUI(){

  console.log(
    POS_CART
  );

}

/* =====================================================
   PAYMENT BUTTONS
===================================================== */

function initializePaymentButtons(){

  const buttons =
    document.querySelectorAll(
      ".method-btn"
    );

  buttons.forEach(function(btn){

    btn.addEventListener(
      "click",
      function(){

        buttons.forEach(function(b){

          b.classList.remove(
            "active"
          );

        });

        btn.classList.add(
          "active"
        );

        ACTIVE_PAYMENT =
          btn.innerText.trim();

      }
    );

  });

}

/* =====================================================
   TABLE SELECTION
===================================================== */

function initializeTableSelection(){

  const tables =
    document.querySelectorAll(
      ".table-card"
    );

  tables.forEach(function(table){

    table.addEventListener(
      "click",
      function(){

        tables.forEach(function(t){

          t.style.outline =
            "none";

        });

        table.style.outline =
          "4px solid #38bdf8";

        ACTIVE_TABLE =
          table.querySelector(
            "h2"
          ).innerText;

        showToast(
          ACTIVE_TABLE +
          " Selected"
        );

      }
    );

  });

}

/* =====================================================
   SETTLEMENT MODAL
===================================================== */

function initializeSettlementModal(){

  const payButton =
    document.querySelector(
      ".pay-btn"
    );

  const modal =
    document.querySelector(
      ".settlement-modal"
    );

  const closeButton =
    document.querySelector(
      ".close-btn"
    );

  const cancelButton =
    document.querySelector(
      ".cancel-btn"
    );

  if(payButton){

    payButton.addEventListener(
      "click",
      function(){

        modal.style.display =
          "flex";

      }
    );

  }

  if(closeButton){

    closeButton.addEventListener(
      "click",
      function(){

        modal.style.display =
          "none";

      }
    );

  }

  if(cancelButton){

    cancelButton.addEventListener(
      "click",
      function(){

        modal.style.display =
          "none";

      }
    );

  }

}

/* =====================================================
   PRINT BILL
===================================================== */

const printButton =
  document.querySelector(
    ".print-btn"
  );

if(printButton){

  printButton.addEventListener(
    "click",
    function(){

      window.print();

    }
  );

}

/* =====================================================
   CLEAR BILL
===================================================== */

const clearButton =
  document.querySelector(
    ".clear-btn"
  );

if(clearButton){

  clearButton.addEventListener(
    "click",
    function(){

      if(

        confirm(
          "Clear current bill?"
        )

      ){

        POS_CART = [];

        showToast(
          "Bill Cleared"
        );

      }

    }
  );

}

/* =====================================================
   CONFIRM PAYMENT
===================================================== */

const confirmButton =
  document.querySelector(
    ".confirm-btn"
  );

if(confirmButton){

  confirmButton.addEventListener(
    "click",
    function(){

      showToast(
        "Payment Successful"
      );

      document.querySelector(
        ".settlement-modal"
      )

      .style.display =
        "none";

    }
  );

}

/* =====================================================
   SHOW TOAST
===================================================== */

function showToast(message){

  const toast =
    document.createElement(
      "div"
    );

  toast.innerHTML =
    message;

  toast.style.position =
    "fixed";

  toast.style.bottom =
    "30px";

  toast.style.right =
    "30px";

  toast.style.background =
    "#0f172a";

  toast.style.color =
    "white";

  toast.style.padding =
    "16px 22px";

  toast.style.borderRadius =
    "16px";

  toast.style.fontWeight =
    "600";

  toast.style.zIndex =
    "99999";

  document.body.appendChild(
    toast
  );

  setTimeout(function(){

    toast.remove();

  },2000);

}

   SAVE BILL
===================================================== */

function saveBill(){

  console.log(
    "SAVE BILL API"
  );

}

/* =====================================================

===================================================== */

function generateKOT(){

  console.log(
    "GENERATE KOT"
  );

}

/* =====================================================
   LOAD MENU API
===================================================== */

function loadMenuItems(){

  console.log(
    "LOAD MENU"
  );

}

/* =====================================================
   SESSION VALIDATION
===================================================== */

function validateSession(){

  console.log(
    "SESSION VALID"
  );

}

</script>
