<script>

/* =====================================================
   BALAJI NEXTGEN ERP
   TABLE MANAGEMENT ENGINE
===================================================== */

/* =====================================================
   GLOBAL VARIABLES
===================================================== */

let ACTIVE_FLOOR = "Main Hall";

let TABLE_DATA = [];

let AUTO_REFRESH_INTERVAL = null;

/* =====================================================
   PAGE LOAD
===================================================== */

window.onload = function(){

  initializeTableManagement();

};

/* =====================================================
   INITIALIZE
===================================================== */

function initializeTableManagement(){

  initializeFloorButtons();

  initializeTableButtons();

  initializeSearch();

  loadRestaurantTables();

  startAutoRefresh();

  console.log(
    "TABLE MANAGEMENT LOADED"
  );

}

/* =====================================================
   FLOOR BUTTONS
===================================================== */

function initializeFloorButtons(){

  const buttons =
    document.querySelectorAll(
      ".floor-btn"
    );

  buttons.forEach(function(btn){

    btn.addEventListener(
      "click",
      function(){

        buttons.forEach(function(b){

          b.classList.remove(
            "active"
          );

        });

        btn.classList.add(
          "active"
        );

        ACTIVE_FLOOR =
          btn.innerText.trim();

        showToast(
          ACTIVE_FLOOR +
          " Selected"
        );

        loadRestaurantTables();

      }
    );

  });

}

/* =====================================================
   TABLE BUTTONS
===================================================== */

function initializeTableButtons(){

  initializeOpenButtons();

  initializeKOTButtons();

  initializeBillingButtons();

  initializeSettlementButtons();

}

/* =====================================================
   OPEN TABLE
===================================================== */

function initializeOpenButtons(){

  const buttons =
    document.querySelectorAll(
      ".open-btn"
    );

  buttons.forEach(function(btn){

    btn.addEventListener(
      "click",
      function(){

        const card =
          btn.closest(
            ".table-card"
          );

        const tableNo =
          card.querySelector(
            "h2"
          ).innerText;

        openTable(
          tableNo
        );

      }
    );

  });

}

function openTable(tableNo){

  showToast(
    tableNo +
    " Opened"
  );

  console.log(
    "OPEN TABLE",
    tableNo
  );

}

/* =====================================================
   KOT BUTTONS
===================================================== */

function initializeKOTButtons(){

  const buttons =
    document.querySelectorAll(
      ".kot-btn"
    );

  buttons.forEach(function(btn){

    btn.addEventListener(
      "click",
      function(){

        const card =
          btn.closest(
            ".table-card"
          );

        const tableNo =
          card.querySelector(
            "h2"
          ).innerText;

        generateKOT(
          tableNo
        );

      }
    );

  });

}

function generateKOT(tableNo){

  showToast(
    "KOT Opened : " +
    tableNo
  );

  console.log(
    "GENERATE KOT",
    tableNo
  );

}

/* =====================================================
   BILLING BUTTONS
===================================================== */

function initializeBillingButtons(){

  const buttons =
    document.querySelectorAll(
      ".bill-btn"
    );

  buttons.forEach(function(btn){

    btn.addEventListener(
      "click",
      function(){

        const card =
          btn.closest(
            ".table-card"
          );

        const tableNo =
          card.querySelector(
            "h2"
          ).innerText;

        openBilling(
          tableNo
        );

      }
    );

  });

}

function openBilling(tableNo){

  showToast(
    "Billing : " +
    tableNo
  );

  console.log(
    "OPEN BILLING",
    tableNo
  );

}

/* =====================================================
   SETTLEMENT
===================================================== */

function initializeSettlementButtons(){

  const buttons =
    document.querySelectorAll(
      ".settle-btn"
    );

  buttons.forEach(function(btn){

    btn.addEventListener(
      "click",
      function(){

        const card =
          btn.closest(
            ".table-card"
          );

        const tableNo =
          card.querySelector(
            "h2"
          ).innerText;

        openSettlement(
          tableNo
        );

      }
    );

  });

}

function openSettlement(tableNo){

  showToast(
    "Settlement : " +
    tableNo
  );

  console.log(
    "SETTLEMENT",
    tableNo
  );

}

/* =====================================================
   SEARCH
===================================================== */

function initializeSearch(){

  const search =
    document.getElementById(
      "tableSearch"
    );

  if(!search) return;

  search.addEventListener(
    "keyup",
    function(){

      const value =
        search.value
        .toLowerCase();

      const cards =
        document.querySelectorAll(
          ".table-card"
        );

      cards.forEach(function(card){

        const text =
          card.innerText
          .toLowerCase();

        if(

          text.includes(value)

        ){

          card.style.display =
            "block";

        }

        else{

          card.style.display =
            "none";

        }

      });

    }
  );

}

/* =====================================================
   LOAD TABLES
===================================================== */

function loadRestaurantTables(){

  console.log(
    "LOAD TABLES FOR",
    ACTIVE_FLOOR
  );

  /* ===============================================
     BACKEND API READY
  ================================================ */

  /*
  google.script.run
    .withSuccessHandler(
      renderTables
    )
    .getRestaurantTables(
      ACTIVE_FLOOR
    );
  */

}

/* =====================================================
   RENDER TABLES
===================================================== */

function renderTables(data){

  console.log(
    data
  );

}

/* =====================================================
   AUTO REFRESH
===================================================== */

function startAutoRefresh(){

  AUTO_REFRESH_INTERVAL =
    setInterval(function(){

      loadRestaurantTables();

      console.log(
        "AUTO REFRESH TABLES"
      );

    },30000);

}

/* =====================================================
   UPDATE COUNTS
===================================================== */

function updateCounts(){

  const available =
    document.querySelectorAll(
      ".available"
    ).length;

  const occupied =
    document.querySelectorAll(
      ".occupied"
    ).length;

  const reserved =
    document.querySelectorAll(
      ".reserved"
    ).length;

  const billing =
    document.querySelectorAll(
      ".billing"
    ).length;

  document.getElementById(
    "availableTables"
  ).innerText =
    available;

  document.getElementById(
    "occupiedTables"
  ).innerText =
    occupied;

  document.getElementById(
    "reservedTables"
  ).innerText =
    reserved;

  document.getElementById(
    "runningTables"
  ).innerText =
    billing;

}

/* =====================================================
   SHOW TOAST
===================================================== */

function showToast(message){

  const toast =
    document.createElement(
      "div"
    );

  toast.innerHTML =
    message;

  toast.style.position =
    "fixed";

  toast.style.bottom =
    "30px";

  toast.style.right =
    "30px";

  toast.style.background =
    "#0f172a";

  toast.style.color =
    "white";

  toast.style.padding =
    "16px 22px";

  toast.style.borderRadius =
    "16px";

  toast.style.fontWeight =
    "700";

  toast.style.zIndex =
    "99999";

  toast.style.boxShadow =
    "0 10px 25px rgba(0,0,0,.2)";

  document.body.appendChild(
    toast
  );

  setTimeout(function(){

    toast.remove();

  },2000);

}

/* =====================================================
   REFRESH COUNTS
===================================================== */

setTimeout(function(){

  updateCounts();

},1000);

</script>
