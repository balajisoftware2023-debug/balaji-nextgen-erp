<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{

  background:#f1f5f9;

  overflow-x:hidden;

  color:#0f172a;

}

/* =====================================================
   PAGE
===================================================== */

.restaurant-billing-page{

  padding:24px;

  min-height:100vh;

}

/* =====================================================
   TOPBAR
===================================================== */

.billing-topbar{

  background:white;

  border-radius:26px;

  padding:24px;

  display:flex;

  justify-content:space-between;

  align-items:center;

  gap:20px;

  box-shadow:
  0 10px 30px rgba(0,0,0,.05);

}

.top-left h1{

  font-size:36px;

  font-weight:800;

  color:#0f172a;

}

.top-left p{

  margin-top:8px;

  color:#64748b;

}

.top-right{

  display:flex;

  gap:18px;

  flex-wrap:wrap;

}

.top-box{

  background:#eff6ff;

  padding:16px 20px;

  border-radius:18px;

  min-width:170px;

}

.top-box span{

  font-size:12px;

  color:#64748b;

}

.top-box h3{

  margin-top:8px;

  font-size:18px;

  color:#1d4ed8;

}

/* =====================================================
   LAYOUT
===================================================== */

.billing-layout{

  margin-top:24px;

  display:grid;

  grid-template-columns:
  2fr 1fr;

  gap:24px;

}

/* =====================================================
   CARD
===================================================== */

.billing-card{

  background:white;

  border-radius:26px;

  padding:24px;

  margin-bottom:24px;

  box-shadow:
  0 10px 30px rgba(0,0,0,.05);

}

.card-title{

  font-size:22px;

  font-weight:800;

  margin-bottom:22px;

  color:#0f172a;

}

/* =====================================================
   CUSTOMER GRID
===================================================== */

.customer-grid{

  display:grid;

  grid-template-columns:
  repeat(2,1fr);

  gap:18px;

}

.customer-grid input{

  height:56px;

  border:1px solid #cbd5e1;

  border-radius:16px;

  padding:0 18px;

  font-size:14px;

}

/* =====================================================
   BILL TABLE
===================================================== */

.bill-table{

  width:100%;

}

.bill-header{

  display:grid;

  grid-template-columns:
  2fr .7fr .8fr .7fr 1fr;

  gap:14px;

  padding:18px;

  border-radius:18px;

  background:#eff6ff;

  font-weight:800;

  color:#1d4ed8;

}

.bill-row{

  display:grid;

  grid-template-columns:
  2fr .7fr .8fr .7fr 1fr;

  gap:14px;

  padding:18px;

  border-bottom:1px solid #e2e8f0;

  align-items:center;

}

/* =====================================================
   SUMMARY
===================================================== */

.summary-section{

  display:flex;

  flex-direction:column;

  gap:16px;

}

.summary-row{

  display:flex;

  justify-content:space-between;

  align-items:center;

  padding-bottom:12px;

  border-bottom:1px dashed #cbd5e1;

}

.grand-total{

  margin-top:16px;

  background:#eff6ff;

  border-radius:22px;

  padding:22px;

  text-align:center;

}

.grand-total span{

  color:#64748b;

}

.grand-total h1{

  margin-top:10px;

  font-size:52px;

  color:#2563eb;

}

/* =====================================================
   PAYMENT GRID
===================================================== */

.payment-grid{

  display:grid;

  grid-template-columns:
  repeat(2,1fr);

  gap:16px;

}

.payment-btn{

  border:none;

  height:58px;

  border-radius:18px;

  background:#f1f5f9;

  font-size:15px;

  font-weight:700;

  cursor:pointer;

  transition:.3s;

}

.payment-btn:hover{

  transform:translateY(-2px);

}

.payment-btn.active{

  background:#2563eb;

  color:white;

}

/* =====================================================
   ACTION GRID
===================================================== */

.action-grid{

  display:grid;

  grid-template-columns:
  1fr 1fr;

  gap:16px;

}

.action-btn{

  border:none;

  height:60px;

  border-radius:18px;

  color:white;

  font-size:15px;

  font-weight:700;

  cursor:pointer;

  transition:.3s;

}

.action-btn:hover{

  transform:translateY(-2px);

}

.save-btn{

  background:#10b981;

}

.print-btn{

  background:#2563eb;

}

.pdf-btn{

  background:#7c3aed;

}

.settle-btn{

  background:#ea580c;

}

.whatsapp-btn{

  background:#16a34a;

}

.email-btn{

  background:#dc2626;

}

/* =====================================================
   RESPONSIVE
===================================================== */

@media(max-width:1200px){

  .billing-layout{

    grid-template-columns:1fr;

  }

}

@media(max-width:768px){

  .billing-topbar{

    flex-direction:column;

    align-items:flex-start;

  }

  .customer-grid{

    grid-template-columns:1fr;

  }

  .bill-header,
  .bill-row{

    font-size:12px;

  }

  .action-grid{

    grid-template-columns:1fr;

  }

}

</style>
