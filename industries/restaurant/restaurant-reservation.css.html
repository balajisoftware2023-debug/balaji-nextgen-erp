<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{

  background:#f1f5f9;

  overflow-x:hidden;

  color:#0f172a;

}

/* =====================================================
   PAGE
===================================================== */

.restaurant-reservation-page{

  padding:24px;

  min-height:100vh;

}

/* =====================================================
   TOPBAR
===================================================== */

.reservation-topbar{

  background:white;

  border-radius:26px;

  padding:24px;

  display:flex;

  justify-content:space-between;

  align-items:center;

  gap:20px;

  box-shadow:
  0 10px 30px rgba(0,0,0,.05);

}

.top-left h1{

  font-size:36px;

  font-weight:800;

  color:#0f172a;

}

.top-left p{

  margin-top:8px;

  color:#64748b;

}

.top-right{

  display:flex;

  gap:18px;

  flex-wrap:wrap;

}

.top-box{

  background:#eff6ff;

  padding:16px 20px;

  border-radius:18px;

  min-width:170px;

}

.top-box span{

  font-size:12px;

  color:#64748b;

}

.top-box h3{

  margin-top:8px;

  font-size:18px;

  color:#2563eb;

}

/* =====================================================
   LAYOUT
===================================================== */

.reservation-layout{

  margin-top:24px;

  display:grid;

  grid-template-columns:
  2fr 1fr;

  gap:24px;

}

/* =====================================================
   CARD
===================================================== */

.reservation-card{

  background:white;

  border-radius:26px;

  padding:24px;

  margin-bottom:24px;

  box-shadow:
  0 10px 30px rgba(0,0,0,.05);

}

.card-title{

  font-size:22px;

  font-weight:800;

  margin-bottom:22px;

  color:#0f172a;

}

/* =====================================================
   FORM
===================================================== */

.reservation-form{

  display:grid;

  grid-template-columns:
  repeat(2,1fr);

  gap:18px;

}

.reservation-form input,
.reservation-form select{

  height:58px;

  border:1px solid #cbd5e1;

  border-radius:16px;

  padding:0 18px;

  font-size:14px;

}

.reservation-form textarea{

  grid-column:span 2;

  height:120px;

  border:1px solid #cbd5e1;

  border-radius:16px;

  padding:18px;

  resize:none;

  font-size:14px;

}

/* =====================================================
   TABLE BUTTONS
===================================================== */

.table-selection-grid{

  display:grid;

  grid-template-columns:
  repeat(3,1fr);

  gap:16px;

}

.table-btn{

  border:none;

  height:70px;

  border-radius:20px;

  color:white;

  font-size:15px;

  font-weight:700;

  cursor:pointer;

  transition:.3s;

}

.table-btn:hover{

  transform:translateY(-2px);

}

.vip-btn{

  background:#7c3aed;

}

.family-btn{

  background:#2563eb;

}

.rooftop-btn{

  background:#10b981;

}

.outdoor-btn{

  background:#f59e0b;

}

.couple-btn{

  background:#ef4444;

}

.hall-btn{

  background:#0f172a;

}

/* =====================================================
   STATUS GRID
===================================================== */

.status-grid{

  display:grid;

  grid-template-columns:
  repeat(2,1fr);

  gap:16px;

}

.status-box{

  border-radius:22px;

  padding:20px;

  color:white;

  text-align:center;

}

.status-box span{

  font-size:13px;

}

.status-box h2{

  margin-top:10px;

  font-size:42px;

}

.confirmed-box{

  background:#10b981;

}

.waiting-box{

  background:#f59e0b;

}

.cancelled-box{

  background:#ef4444;

}

.completed-box{

  background:#2563eb;

}

/* =====================================================
   WAITING LIST
===================================================== */

.waiting-list{

  display:flex;

  flex-direction:column;

  gap:16px;

}

.waiting-row{

  background:#f8fafc;

  border-radius:18px;

  padding:18px;

  display:flex;

  justify-content:space-between;

  align-items:center;

}

/* =====================================================
   ACTION GRID
===================================================== */

.action-grid{

  display:grid;

  grid-template-columns:
  1fr 1fr;

  gap:16px;

}

.action-btn{

  border:none;

  height:60px;

  border-radius:18px;

  color:white;

  font-size:15px;

  font-weight:700;

  cursor:pointer;

  transition:.3s;

}

.action-btn:hover{

  transform:translateY(-2px);

}

.confirm-btn{

  background:#10b981;

}

.edit-btn{

  background:#2563eb;

}

.cancel-btn{

  background:#dc2626;

}

.print-btn{

  background:#7c3aed;

}

.whatsapp-btn{

  background:#16a34a;

}

/* =====================================================
   RESPONSIVE
===================================================== */

@media(max-width:1200px){

  .reservation-layout{

    grid-template-columns:1fr;

  }

}

@media(max-width:768px){

  .reservation-topbar{

    flex-direction:column;

    align-items:flex-start;

  }

  .reservation-form{

    grid-template-columns:1fr;

  }

  .reservation-form textarea{

    grid-column:span 1;

  }

  .table-selection-grid{

    grid-template-columns:1fr;

  }

  .status-grid{

    grid-template-columns:1fr;

  }

  .action-grid{

    grid-template-columns:1fr;

  }

}

</style>
