<script>

/* =====================================================
   BALAJI NEXTGEN ERP
   RECIPE COSTING ENGINE
===================================================== */

/* =====================================================
   GLOBAL VARIABLES
===================================================== */

let RECIPE_DATA = [];

let CURRENT_RECIPE_COST = 0;

let AUTO_REFRESH = null;

/* =====================================================
   PAGE LOAD
===================================================== */

window.onload = function(){

  initializeRecipeCosting();

};

/* =====================================================
   INITIALIZE
===================================================== */

function initializeRecipeCosting(){

  initializeButtons();

  initializeFilters();

  initializeFormValidation();

  loadRecipeData();

  startAutoRefresh();

  console.log(
    "RECIPE COSTING ENGINE LOADED"
  );

}

/* =====================================================
   BUTTONS
===================================================== */

function initializeButtons(){

  initializeCreateButton();

  initializeCalculateButton();

  initializeExportButton();

  initializePrintButton();

  initializeQuickButtons();

}

/* =====================================================
   CREATE RECIPE
===================================================== */

function initializeCreateButton(){

  const button =
    document.querySelector(
      ".create-btn"
    );

  if(!button) return;

  button.addEventListener(
    "click",
    function(){

      createRecipe();

    }
  );

}

function createRecipe(){

  showToast(
    "Recipe Creation Started"
  );

  console.log(
    "CREATE RECIPE"
  );

}

/* =====================================================
   CALCULATE COST
===================================================== */

function initializeCalculateButton(){

  const button =
    document.querySelector(
      ".calculate-btn"
    );

  if(!button) return;

  button.addEventListener(
    "click",
    function(){

      calculateRecipeCost();

    }
  );

}

function calculateRecipeCost(){

  CURRENT_RECIPE_COST = 333;

  showToast(
    "Recipe Cost Calculated"
  );

  console.log(
    "CALCULATE RECIPE COST"
  );

}

/* =====================================================
   EXPORT EXCEL
===================================================== */

function initializeExportButton(){

  const button =
    document.querySelector(
      ".export-btn"
    );

  if(!button) return;

  button.addEventListener(
    "click",
    function(){

      exportRecipeExcel();

    }
  );

}

function exportRecipeExcel(){

  showToast(
    "Recipe Excel Export Started"
  );

  console.log(
    "EXPORT RECIPE EXCEL"
  );

}

/* =====================================================
   PRINT RECIPE
===================================================== */

function initializePrintButton(){

  const button =
    document.querySelector(
      ".print-btn"
    );

  if(!button) return;

  button.addEventListener(
    "click",
    function(){

      printRecipe();

    }
  );

}

function printRecipe(){

  window.print();

}

/* =====================================================
   QUICK ACTIONS
===================================================== */

function initializeQuickButtons(){

  const buttons =
    document.querySelectorAll(
      ".quick-btn"
    );

  buttons.forEach(function(btn){

    btn.addEventListener(
      "click",
      function(){

        const action =
          btn.innerText.trim();

        handleQuickAction(
          action
        );

      }
    );

  });

}

function handleQuickAction(action){

  showToast(
    action
  );

  console.log(
    "QUICK ACTION",
    action
  );

}

/* =====================================================
   FILTERS
===================================================== */

function initializeFilters(){

  const filters =
    document.querySelectorAll(
      ".filter-section select, .filter-section input"
    );

  filters.forEach(function(filter){

    filter.addEventListener(
      "change",
      function(){

        applyFilters();

      }
    );

  });

}

function applyFilters(){

  showToast(
    "Recipe Filters Applied"
  );

  console.log(
    "APPLY RECIPE FILTERS"
  );

  loadRecipeData();

}

/* =====================================================
   FORM VALIDATION
===================================================== */

function initializeFormValidation(){

  const inputs =
    document.querySelectorAll(
      ".recipe-form input"
    );

  inputs.forEach(function(input){

    input.addEventListener(
      "keyup",
      function(){

        validateRecipeForm();

      }
    );

  });

}

function validateRecipeForm(){

  console.log(
    "VALIDATE RECIPE FORM"
  );

  return true;

}

/* =====================================================
   LOAD RECIPE DATA
===================================================== */

function loadRecipeData(){

  console.log(
    "LOAD RECIPE DATA"
  );

  /*
  google.script.run
    .withSuccessHandler(
      renderRecipeData
    )
    .getRecipeData();
  */

}

/* =====================================================
   RENDER RECIPE DATA
===================================================== */

function renderRecipeData(data){

  RECIPE_DATA = data;

  console.log(
    RECIPE_DATA
  );

}

/* =====================================================
   AUTO REFRESH
===================================================== */

function startAutoRefresh(){

  AUTO_REFRESH =
    setInterval(function(){

      loadRecipeData();

      console.log(
        "AUTO REFRESH RECIPE"
      );

    },60000);

}

/* =====================================================
   COST OPERATIONS
===================================================== */

function duplicateRecipe(){

  console.log(
    "DUPLICATE RECIPE"
  );

}

  console.log(
    "REFRESH COSTING"
  );

}

function saveRecipe(){

  console.log(
    "SAVE RECIPE"
  );

}

/* =====================================================
   LIVE MODULES
===================================================== */

function autoFoodCost(){

  console.log(
    "AUTO FOOD COST"
  );

}

function menuEngineering(){

  console.log(
    "MENU ENGINEERING"
  );

}

function profitabilityAnalysis(){

  console.log(
    "PROFITABILITY ANALYSIS"
  );

}

function recipeConsumption(){

  console.log(
    "RECIPE CONSUMPTION"
  );

}

function yieldVariance(){

  console.log(
    "YIELD VARIANCE"
  );

}

/* =====================================================
   COST SUMMARY
===================================================== */

function updateCostSummary(){

  console.log(
    "UPDATE COST SUMMARY"
  );

}

/* =====================================================
   TOAST
===================================================== */

function showToast(message){

  const toast =
    document.createElement(
      "div"
    );

  toast.innerHTML =
    message;

  toast.style.position =
      "fixed";

  toast.style.bottom =
      "30px";

  toast.style.right =
      "30px";

  toast.style.background =
      "#0f172a";

  toast.style.color =
      "white";

  toast.style.padding =
      "16px 22px";

  toast.style.borderRadius =
      "16px";

  toast.style.fontWeight =
      "700";

  toast.style.zIndex =
      "99999";

  toast.style.boxShadow =
      "0 10px 25px rgba(0,0,0,.2)";

  document.body.appendChild(
    toast
  );

  setTimeout(function(){

    toast.remove();

  },2000);

}

</script>
