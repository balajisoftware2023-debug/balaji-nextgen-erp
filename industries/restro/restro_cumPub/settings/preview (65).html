<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>ERP Preferences</title>

<style>

:root{
    --bg:#0b0f19;
    --card:#151c28;
    --text:#ffffff;
    --accent:#f59e0b;
    --border:#263244;
}

.light-theme{
    --bg:#f4f6f9;
    --card:#ffffff;
    --text:#111111;
    --accent:#ff6b00;
    --border:#dddddd;
}

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
    transition:0.3s;
}

.topbar{
    background:var(--card);
    padding:18px 25px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid var(--border);
}

.topbar h1{
    margin:0;
    color:var(--accent);
}

.container{
    max-width:1200px;
    margin:auto;
    padding:25px;
}

.grid{
    display:grid;
    grid-template-columns:
    repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
}

.card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:18px;
    padding:25px;
}

.card h2{
    margin-top:0;
    color:var(--accent);
}

.preference{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 0;
    border-bottom:1px solid var(--border);
}

.preference:last-child{
    border-bottom:none;
}

label{
    font-weight:bold;
}

select,
input{
    padding:10px;
    border-radius:8px;
    border:none;
    width:140px;
}

button{
    width:100%;
    margin-top:20px;
    padding:14px;
    border:none;
    border-radius:10px;
    background:linear-gradient(
    135deg,#dc2626,#7f1d1d);
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.theme-box{
    display:flex;
    gap:15px;
    margin-top:20px;
}

.theme{
    flex:1;
    padding:18px;
    border-radius:12px;
    text-align:center;
    cursor:pointer;
    font-weight:bold;
}

.dark{
    background:#111827;
    color:white;
    border:2px solid #f59e0b;
}

.light{
    background:white;
    color:black;
    border:2px solid #ff6b00;
}

.footer{
    text-align:center;
    margin-top:25px;
    color:gray;
}

@media(max-width:768px){

    .topbar{
        flex-direction:column;
        gap:10px;
        text-align:center;
    }

}

</style>
</head>

<body id="body">

<div class="topbar">

<h1>BALAJI NEXTGEN ERP</h1>

<h3>ERP Preferences</h3>

</div>

<div class="container">

<div class="grid">

<!-- THEME SETTINGS -->

<div class="card">

<h2>Theme Settings</h2>

<div class="theme-box">

<div class="theme dark"
onclick="setDarkMode()">
Dark Mode
</div>

<div class="theme light"
onclick="setLightMode()">
Light Mode
</div>

</div>

<button onclick="saveTheme()">
SAVE THEME SETTINGS
</button>

</div>

<!-- ERP SETTINGS -->

<div class="card">

<h2>ERP Preferences</h2>

<div class="preference">

<label>Enable GST</label>

<input type="checkbox" checked>

</div>

<div class="preference">

<label>Inventory Alerts</label>

<input type="checkbox" checked>

</div>

<div class="preference">

<label>Auto Backup</label>

<input type="checkbox">

</div>

<div class="preference">

<label>Sidebar Style</label>

<select>
<option>Expanded</option>
<option>Collapsed</option>
</select>

</div>

<div class="preference">

<label>Language</label>

<select>
<option>English</option>
<option>Hindi</option>
<option>Bengali</option>
</select>

</div>

<button>
SAVE ERP SETTINGS
</button>

</div>

<!-- NOTIFICATION -->

<div class="card">

<h2>Notification Settings</h2>

<div class="preference">

<label>Email Alerts</label>

<input type="checkbox" checked>

</div>

<div class="preference">

<label>SMS Alerts</label>

<input type="checkbox">

</div>

<div class="preference">

<label>Sound Notification</label>

<input type="checkbox" checked>

</div>

<div class="preference">

<label>Low Stock Warning</label>

<input type="checkbox" checked>

</div>

<button>
SAVE NOTIFICATIONS
</button>

</div>

</div>

<div class="footer">

© BALAJI NEXTGEN ERP
• Multi Industry Cloud ERP

</div>

</div>

<script>

function setDarkMode(){

    document.body.classList.remove(
    "light-theme");

    localStorage.setItem(
    "erpTheme","dark");

}

function setLightMode(){

    document.body.classList.add(
    "light-theme");

    localStorage.setItem(
    "erpTheme","light");

}

function saveTheme(){

    alert(
    "Theme Settings Saved Successfully");

}

window.onload = function(){

    const theme =
    localStorage.getItem("erpTheme");

    if(theme === "light"){

        document.body.classList.add(
        "light-theme");

    }

}

</script>

</body>
</html>
