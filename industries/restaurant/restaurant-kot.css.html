<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{

  background:#f1f5f9;

  overflow:hidden;

}

/* =====================================================
   MAIN PAGE
===================================================== */

.restaurant-kot-page{

  height:100vh;

  display:flex;

  flex-direction:column;

  padding:20px;

}

/* =====================================================
   TOPBAR
===================================================== */

.kot-topbar{

  background:white;

  border-radius:24px;

  padding:22px;

  display:flex;

  justify-content:space-between;

  align-items:center;

  box-shadow:
  0 10px 30px rgba(0,0,0,.05);

}

.top-left h1{

  font-size:34px;

  color:#0f172a;

}

.top-left p{

  margin-top:6px;

  color:#64748b;

}

.top-right{

  display:flex;

  gap:18px;

}

/* =====================================================
   STATUS BOX
===================================================== */

.status-box{

  min-width:130px;

  padding:18px;

  border-radius:22px;

  color:white;

  text-align:center;

}

.status-box span{

  font-size:14px;

  opacity:.9;

}

.status-box h2{

  margin-top:10px;

  font-size:38px;

}

.pending-box{

  background:#f97316;

}

.preparing-box{

  background:#2563eb;

}

.ready-box{

  background:#059669;

}

.delayed-box{

  background:#dc2626;

}

/* =====================================================
   KOT BOARD
===================================================== */

.kot-board{

  margin-top:22px;

  flex:1;

  display:grid;

  grid-template-columns:
  repeat(3,1fr);

  gap:22px;

  overflow:hidden;

}

/* =====================================================
   COLUMN
===================================================== */

.kot-column{

  background:white;

  border-radius:26px;

  padding:20px;

  display:flex;

  flex-direction:column;

  overflow-y:auto;

  box-shadow:
  0 10px 30px rgba(0,0,0,.05);

}

.column-header{

  padding:18px;

  border-radius:18px;

  color:white;

  font-size:22px;

  font-weight:700;

  text-align:center;

  margin-bottom:22px;

}

.pending-header{

  background:#f97316;

}

.preparing-header{

  background:#2563eb;

}

.ready-header{

  background:#059669;

}

/* =====================================================
   KOT CARD
===================================================== */

.kot-card{

  border-radius:24px;

  padding:20px;

  margin-bottom:20px;

  color:white;

}

.pending-card{

  background:#fb923c;

}

.preparing-card{

  background:#3b82f6;

}

.ready-card{

  background:#10b981;

}

/* =====================================================
   KOT TOP
===================================================== */

.kot-card-top{

  display:flex;

  justify-content:space-between;

  align-items:center;

}

.kot-card-top h2{

  font-size:28px;

}

.kot-card-top span{

  background:rgba(255,255,255,.2);

  padding:8px 12px;

  border-radius:12px;

  font-size:13px;

}

/* =====================================================
   KOT INFO
===================================================== */

.kot-info{

  margin-top:18px;

  display:flex;

  justify-content:space-between;

  font-size:15px;

}

/* =====================================================
   KOT ITEMS
===================================================== */

.kot-items{

  margin-top:20px;

  background:rgba(255,255,255,.12);

  padding:18px;

  border-radius:18px;

}

.kot-items ul{

  padding-left:18px;

}

.kot-items li{

  margin-bottom:10px;

  line-height:1.6;

}

/* =====================================================
   FOOTER
===================================================== */

.kot-footer{

  margin-top:22px;

}

.action-btn{

  width:100%;

  height:54px;

  border:none;

  border-radius:16px;

  font-size:16px;

  font-weight:700;

  cursor:pointer;

  transition:.3s;

}

.action-btn:hover{

  transform:translateY(-2px);

}

.prepare-btn{

  background:white;

  color:#ea580c;

}

.ready-btn{

  background:white;

  color:#2563eb;

}

.served-btn{

  background:white;

  color:#059669;

}

/* =====================================================
   SCROLLBAR
===================================================== */

::-webkit-scrollbar{

  width:8px;

}

::-webkit-scrollbar-thumb{

  background:#cbd5e1;

  border-radius:20px;

}

/* =====================================================
   RESPONSIVE
===================================================== */

@media(max-width:1200px){

  .kot-board{

    grid-template-columns:1fr;

  }

}

@media(max-width:900px){

  .kot-topbar{

    flex-direction:column;

    gap:20px;

    align-items:flex-start;

  }

  .top-right{

    width:100%;

    overflow-x:auto;

  }

}

</style>
