<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{

  background:#f1f5f9;

  overflow-x:hidden;

  color:#0f172a;

}

/* =====================================================
   PAGE
===================================================== */

.table-management-page{

  padding:24px;

  min-height:100vh;

}

/* =====================================================
   TOPBAR
===================================================== */

.table-topbar{

  background:white;

  border-radius:26px;

  padding:24px;

  display:flex;

  justify-content:space-between;

  align-items:center;

  gap:20px;

  box-shadow:
  0 10px 30px rgba(0,0,0,.05);

}

.top-left h1{

  font-size:36px;

  font-weight:800;

  color:#0f172a;

}

.top-left p{

  margin-top:8px;

  color:#64748b;

}

.top-right{

  display:flex;

  gap:18px;

  flex-wrap:wrap;

}

/* =====================================================
   STATUS BOX
===================================================== */

.top-box{

  min-width:140px;

  padding:18px;

  border-radius:22px;

  color:white;

  text-align:center;

}

.top-box span{

  font-size:13px;

  opacity:.9;

}

.top-box h2{

  margin-top:10px;

  font-size:42px;

  font-weight:800;

}

.available-box{

  background:
  linear-gradient(
    135deg,
    #10b981,
    #059669
  );

}

.occupied-box{

  background:
  linear-gradient(
    135deg,
    #ef4444,
    #dc2626
  );

}

.reserved-box{

  background:
  linear-gradient(
    135deg,
    #f59e0b,
    #d97706
  );

}

.billing-box{

  background:
  linear-gradient(
    135deg,
    #2563eb,
    #1d4ed8
  );

}

/* =====================================================
   FLOOR BUTTONS
===================================================== */

.floor-selector{

  margin-top:24px;

  display:flex;

  gap:14px;

  flex-wrap:wrap;

}

.floor-btn{

  border:none;

  padding:14px 22px;

  border-radius:16px;

  background:white;

  font-size:14px;

  font-weight:700;

  cursor:pointer;

  transition:.3s;

  box-shadow:
  0 6px 14px rgba(0,0,0,.05);

}

.floor-btn:hover{

  transform:translateY(-2px);

  background:#2563eb;

  color:white;

}

.floor-btn.active{

  background:#2563eb;

  color:white;

}

/* =====================================================
   SEARCH PANEL
===================================================== */

.search-panel{

  margin-top:24px;

  background:white;

  border-radius:22px;

  padding:18px;

  display:flex;

  gap:14px;

  box-shadow:
  0 10px 24px rgba(0,0,0,.05);

}

.search-panel input{

  flex:1;

  height:56px;

  border:1px solid #cbd5e1;

  border-radius:16px;

  padding:0 18px;

  font-size:15px;

}

.search-btn{

  border:none;

  width:160px;

  border-radius:16px;

  background:#2563eb;

  color:white;

  font-size:15px;

  font-weight:700;

  cursor:pointer;

}

/* =====================================================
   TABLE GRID
===================================================== */

.table-grid{

  margin-top:24px;

  display:grid;

  grid-template-columns:
  repeat(auto-fit,minmax(320px,1fr));

  gap:22px;

}

/* =====================================================
   TABLE CARD
===================================================== */

.table-card{

  border-radius:28px;

  padding:24px;

  color:white;

  min-height:320px;

  position:relative;

  overflow:hidden;

  box-shadow:
  0 12px 28px rgba(0,0,0,.08);

  transition:.4s;

}

.table-card:hover{

  transform:translateY(-6px);

}

.table-card::before{

  content:'';

  position:absolute;

  top:0;

  left:-100%;

  width:100%;

  height:100%;

  background:
  linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,.2),
    transparent
  );

  transition:.8s;

}

.table-card:hover::before{

  left:100%;

}

/* =====================================================
   CARD COLORS
===================================================== */

.available{

  background:
  linear-gradient(
    135deg,
    #10b981,
    #059669
  );

}

.occupied{

  background:
  linear-gradient(
    135deg,
    #ef4444,
    #dc2626
  );

}

.reserved{

  background:
  linear-gradient(
    135deg,
    #f59e0b,
    #d97706
  );

}

.billing{

  background:
  linear-gradient(
    135deg,
    #2563eb,
    #1d4ed8
  );

}

.cleaning{

  background:
  linear-gradient(
    135deg,
    #64748b,
    #475569
  );

}

/* =====================================================
   TABLE HEADER
===================================================== */

.table-header{

  display:flex;

  justify-content:space-between;

  align-items:center;

}

.table-header h2{

  font-size:56px;

  font-weight:900;

}

.table-header span{

  background:rgba(255,255,255,.18);

  padding:10px 16px;

  border-radius:14px;

  font-size:13px;

  font-weight:700;

}

/* =====================================================
   DETAILS
===================================================== */

.table-details{

  margin-top:24px;

  line-height:34px;

  font-size:15px;

}

/* =====================================================
   ACTIONS
===================================================== */

.table-actions{

  margin-top:24px;

  display:flex;

  gap:12px;

  flex-wrap:wrap;

}

.table-actions button{

  border:none;

  padding:12px 18px;

  border-radius:14px;

  background:white;

  color:#0f172a;

  font-size:13px;

  font-weight:800;

  cursor:pointer;

  transition:.3s;

}

.table-actions button:hover{

  transform:scale(1.05);

}

/* =====================================================
   BUTTON COLORS
===================================================== */

.open-btn{

  color:#059669 !important;

}

.kot-btn{

  color:#ea580c !important;

}

.bill-btn{

  color:#2563eb !important;

}

.reserve-btn{

  color:#d97706 !important;

}

.settle-btn{

  color:#7c3aed !important;

}

.clean-btn{

  color:#475569 !important;

}

/* =====================================================
   RESPONSIVE
===================================================== */

@media(max-width:1200px){

  .table-topbar{

    flex-direction:column;

    align-items:flex-start;

  }

}

@media(max-width:768px){

  .search-panel{

    flex-direction:column;

  }

  .search-btn{

    width:100%;

    height:56px;

  }

  .table-grid{

    grid-template-columns:1fr;

  }

}

</style>
