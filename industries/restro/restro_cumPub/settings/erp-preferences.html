<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>erp-preferences.html</title>

<style>

/* =====================================================
   GLOBAL
===================================================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{
    background:var(--bg);
    color:var(--text);
    transition:0.3s;
    overflow-x:hidden;
}

/* =====================================================
   DEFAULT THEME
===================================================== */

:root{

    --bg:#ececec;
    --card:#ffffff;
    --text:#111827;

    --header1:#ff6a00;
    --header2:#ff7f00;

    --title:#ff6a00;

    --button1:#ff1d25;
    --button2:#b31217;

    --border:#d1d5db;
}

/* =====================================================
   NEXTGEN LIGHT ORANGE
===================================================== */

.nextgen-light-orange{

    --bg:#ececec;
    --card:#ffffff;
    --text:#111827;

    --header1:#ff6a00;
    --header2:#ff7f00;

    --title:#ff6a00;

    --button1:#ff1d25;
    --button2:#b31217;

    --border:#d1d5db;
}

/* =====================================================
   TALLY STYLE
===================================================== */

.tally-style{

    --bg:#dfe7f2;
    --card:#ffffff;
    --text:#111827;

    --header1:#1e4f96;
    --header2:#295ca8;

    --title:#1e4f96;

    --button1:#295ca8;
    --button2:#1e4f96;

    --border:#b6c5dc;
}

/* =====================================================
   NEXTGEN DARK PRO
===================================================== */

.nextgen-dark-pro{

    --bg:#040812;
    --card:#101826;
    --text:#ffffff;

    --header1:#ff6a00;
    --header2:#ff7f00;

    --title:#ff7f00;

    --button1:#ff1d25;
    --button2:#b31217;

    --border:#253044;
}

/* =====================================================
   GST PORTAL BLUE
===================================================== */

.gst-portal-blue{

    --bg:#e8eef8;
    --card:#ffffff;
    --text:#111827;

    --header1:#4b84c4;
    --header2:#3d76b6;

    --title:#4b84c4;

    --button1:#4b84c4;
    --button2:#3d76b6;

    --border:#bfd0e8;
}

/* =====================================================
   NEXTGEN LIGHT BLUE
===================================================== */

.nextgen-light-blue{

    --bg:#ececec;
    --card:#ffffff;
    --text:#111827;

    --header1:#4b84c4;
    --header2:#3d76b6;

    --title:#ff6a00;

    --button1:#ff1d25;
    --button2:#b31217;

    --border:#d1d5db;
}

/* =====================================================
   CORPORATE SILVER
===================================================== */

.corporate-silver{

    --bg:#f2f4f7;
    --card:#ffffff;
    --text:#1f2937;

    --header1:#6b7280;
    --header2:#4b5563;

    --title:#6b7280;

    --button1:#6b7280;
    --button2:#4b5563;

    --border:#d1d5db;
}

/* =====================================================
   CHATGPT TEAL
===================================================== */

.chatgpt-teal{

    --bg:#eef7f7;
    --card:#ffffff;
    --text:#111827;

    --header1:#46b6bc;
    --header2:#329ea4;

    --title:#329ea4;

    --button1:#46b6bc;
    --button2:#329ea4;

    --border:#bde3e5;
}

/* =====================================================
   HEADER
===================================================== */

.topbar{

    width:100%;
    height:105px;

    background:linear-gradient(
        90deg,
        var(--header1),
        var(--header2)
    );

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 30px;
}

.brand{

    display:flex;
    align-items:center;
    gap:18px;
}

.brand img{

    width:58px;
    height:58px;

    border-radius:50%;
    object-fit:cover;

    background:#fff;
}

.brand h1{

    font-size:24px;
    color:#fff;
    font-weight:700;
}

.page-title{

    font-size:22px;
    color:#fff;
    font-weight:700;
}

/* =====================================================
   WRAPPER
===================================================== */

.wrapper{

    width:100%;
    max-width:1400px;

    margin:auto;

    padding:35px 20px;

    display:flex;
    justify-content:center;
    align-items:flex-start;

    gap:30px;

    flex-wrap:nowrap;
}

/* =====================================================
   CARD
===================================================== */

.card{

    width:400px;
    min-width:400px;

    height:590px;

    background:var(--card);

    border:1px solid var(--border);

    border-radius:22px;

    padding:30px;

    box-shadow:0 5px 18px rgba(0,0,0,0.08);
}

.card h2{

    color:var(--title);

    font-size:22px;

    margin-bottom:35px;
}

/* =====================================================
   ROW
===================================================== */

.row{

    display:flex;
    justify-content:space-between;
    align-items:center;

    margin-bottom:28px;

    border-bottom:1px solid var(--border);

    padding-bottom:20px;
}

.row label{

    font-size:17px;
    font-weight:600;
}

/* =====================================================
   SELECT
===================================================== */

select{

    width:210px;
    height:50px;

    border-radius:14px;

    border:2px solid #222;

    padding:0 15px;

    font-size:16px;
}

/* =====================================================
   CHECKBOX
===================================================== */

input[type="checkbox"]{

    width:20px;
    height:20px;
}

/* =====================================================
   BUTTON
===================================================== */

.btn{

    width:100%;
    height:55px;

    border:none;

    border-radius:14px;

    background:linear-gradient(
        90deg,
        var(--button1),
        var(--button2)
    );

    color:#fff;

    font-size:18px;
    font-weight:700;

    cursor:pointer;

    margin-top:18px;
}

/* =====================================================
   FOOTER
===================================================== */

.footer{

    text-align:center;

    padding:25px;

    font-size:16px;

    color:#6b7280;
}

/* =====================================================
   RESPONSIVE
===================================================== */

@media(max-width:1280px){

    .wrapper{

        flex-wrap:wrap;
    }

}

@media(max-width:768px){

    .topbar{

        height:auto;

        flex-direction:column;

        gap:15px;

        padding:20px;
    }

    .wrapper{

        padding:20px;
    }

    .card{

        width:100%;
        min-width:100%;
    }

    .row{

        flex-direction:column;
        align-items:flex-start;

        gap:15px;
    }

    select{

        width:100%;
    }

}

</style>
</head>

<body class="nextgen-dark-pro">

<!-- =====================================================
     HEADER
===================================================== -->

<div class="topbar">

    <div class="brand">

        <img src="balaji-fixed-logo.png">

        <h1>BALAJI NEXTGEN ERP</h1>

    </div>

    <div class="page-title">

        ERP Preferences

    </div>

</div>

<!-- =====================================================
     MAIN
===================================================== -->

<div class="wrapper">

    <!-- THEME SETTINGS -->

    <div class="card">

        <h2>Theme Settings</h2>

        <div class="row">

            <label>Select Theme</label>

            <select id="themeSelect">

                <option value="nextgen-light-orange">
                NextGen Light Orange
                </option>

                <option value="tally-style">
                Tally Style
                </option>

                <option value="nextgen-dark-pro" selected>
                NextGen Dark Pro
                </option>

                <option value="gst-portal-blue">
                GST Portal Blue
                </option>

                <option value="nextgen-light-blue">
                NextGen Light Blue
                </option>

                <option value="corporate-silver">
                Corporate Silver
                </option>

                <option value="chatgpt-teal">
                ChatGPT Teal
                </option>

            </select>

        </div>

        <button class="btn">
        SAVE THEME SETTINGS
        </button>

    </div>

    <!-- ERP SETTINGS -->

    <div class="card">

        <h2>ERP Preferences</h2>

        <div class="row">
            <label>Enable GST</label>
            <input type="checkbox" checked>
        </div>

        <div class="row">
            <label>Inventory Alerts</label>
            <input type="checkbox" checked>
        </div>

        <div class="row">
            <label>Auto Backup</label>
            <input type="checkbox">
        </div>

        <div class="row">

            <label>Sidebar Style</label>

            <select>
                <option>Expanded</option>
                <option>Compact</option>
            </select>

        </div>

        <div class="row">

            <label>Language</label>

            <select>
                <option>English</option>
                <option>Hindi</option>
            </select>

        </div>

        <button class="btn">
        SAVE ERP SETTINGS
        </button>

    </div>

    <!-- NOTIFICATION -->

    <div class="card">

        <h2>Notification Settings</h2>

        <div class="row">
            <label>Email Alerts</label>
            <input type="checkbox" checked>
        </div>

        <div class="row">
            <label>SMS Alerts</label>
            <input type="checkbox">
        </div>

        <div class="row">
            <label>Sound Notification</label>
            <input type="checkbox" checked>
        </div>

        <div class="row">
            <label>Low Stock Warning</label>
            <input type="checkbox" checked>
        </div>

        <button class="btn">
        SAVE NOTIFICATIONS
        </button>

    </div>

</div>

<!-- =====================================================
     FOOTER
===================================================== -->

<div class="footer">

© BALAJI NEXTGEN ERP • Multi Industry Cloud ERP

</div>

<!-- =====================================================
     SCRIPT
===================================================== -->

<script>

const themeSelect =
document.getElementById("themeSelect");

themeSelect.addEventListener(
"change",
function(){

    document.body.className = "";

    document.body.classList.add(
        this.value
    );

    localStorage.setItem(
        "erpTheme",
        this.value
    );

});

window.onload = function(){

    let savedTheme =
    localStorage.getItem("erpTheme");

    if(savedTheme){

        document.body.className = "";

        document.body.classList.add(
            savedTheme
        );

        themeSelect.value =
        savedTheme;
    }

};

</script>

</body>
</html>
