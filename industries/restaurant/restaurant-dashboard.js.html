<script>

let ERP_USER = null;

let ERP_TOKEN = null;

/* INIT */

window.onload = function(){

  initializeDashboard();

};

/* INITIALIZE */

function initializeDashboard(){

  ERP_TOKEN =
    localStorage.getItem(
      "ERP_TOKEN"
    );

  ERP_USER = JSON.parse(

    localStorage.getItem(
      "ERP_USER"
    )

  );

  if(
    !ERP_TOKEN ||
    !ERP_USER
  ){

    redirectLogin();

    return;

  }

  loadUserProfile();

  validateSession();

}

/* LOAD USER */

function loadUserProfile(){

  if(ERP_USER){

    document.getElementById(
      "userName"
    ).innerHTML =

      ERP_USER.name ||
      "Restaurant Manager";

    document.getElementById(
      "userAvatar"
    ).innerHTML =

      (
        ERP_USER.name || "R"
      )

      .charAt(0)

      .toUpperCase();

  }

}

/* VALIDATE */

function validateSession(){

  google.script.run

  .withSuccessHandler(function(res){

    console.log(res);

    if(
      res.status !== "SUCCESS"
    ){

      logoutERP();

    }

  })

  .withFailureHandler(function(err){

    console.log(err);

  })

  .validateSessionAPI(
    ERP_TOKEN
  );

}

/* LOGOUT */

function logoutERP(){

  localStorage.removeItem(
    "ERP_TOKEN"
  );

  localStorage.removeItem(
    "ERP_USER"
  );

  window.location.href =
    "?page=login";

}

/* REDIRECT */

function redirectLogin(){

  window.location.href =
    "?page=login";

}

</script>
