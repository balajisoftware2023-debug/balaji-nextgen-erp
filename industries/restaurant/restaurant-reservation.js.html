<script>

/* =====================================================
   BALAJI NEXTGEN ERP
   RESTAURANT RESERVATION ENGINE
===================================================== */

/* =====================================================
   GLOBAL VARIABLES
===================================================== */

let ACTIVE_TABLE_TYPE = "";

let RESERVATION_STATUS = "CONFIRMED";

/* =====================================================
   PAGE LOAD
===================================================== */

window.onload = function(){

  initializeReservation();

};

/* =====================================================
   INITIALIZE
===================================================== */

function initializeReservation(){

  initializeTableButtons();

  initializeActionButtons();

  initializeFormValidation();

  console.log(
    "RESERVATION ENGINE LOADED"
  );

}

/* =====================================================
   TABLE BUTTONS
===================================================== */

function initializeTableButtons(){

  const buttons =
    document.querySelectorAll(
      ".table-btn"
    );

  buttons.forEach(function(btn){

    btn.addEventListener(
      "click",
      function(){

        buttons.forEach(function(b){

          b.style.outline =
            "none";

        });

        btn.style.outline =
          "4px solid #0f172a";

        ACTIVE_TABLE_TYPE =
          btn.innerText.trim();

        showToast(
          ACTIVE_TABLE_TYPE +
          " Selected"
        );

      }
    );

  });

}

/* =====================================================
   ACTION BUTTONS
===================================================== */

function initializeActionButtons(){

  initializeConfirmButton();

  initializeEditButton();

  initializeCancelButton();

  initializePrintButton();

  initializeWhatsAppButton();

}

/* =====================================================
   CONFIRM RESERVATION
===================================================== */

function initializeConfirmButton(){

  const button =
    document.querySelector(
      ".confirm-btn"
    );

  if(!button) return;

  button.addEventListener(
    "click",
    function(){

      confirmReservation();

    }
  );

}

function confirmReservation(){

  if(

    !validateReservation()

  ){

    return;

  }

  showToast(
    "Reservation Confirmed"
  );

  console.log(
    "CONFIRM RESERVATION"
  );

  /*
  google.script.run
    .withSuccessHandler(
      function(response){

      }
    )
    .saveReservation();
  */

}

/* =====================================================
   EDIT BOOKING
===================================================== */

function initializeEditButton(){

  const button =
    document.querySelector(
      ".edit-btn"
    );

  if(!button) return;

  button.addEventListener(
    "click",
    function(){

      editReservation();

    }
  );

}

function editReservation(){

  showToast(
    "Edit Reservation"
  );

  console.log(
    "EDIT RESERVATION"
  );

}

/* =====================================================
   CANCEL BOOKING
===================================================== */

function initializeCancelButton(){

  const button =
    document.querySelector(
      ".cancel-btn"
    );

  if(!button) return;

  button.addEventListener(
    "click",
    function(){

      cancelReservation();

    }
  );

}

function cancelReservation(){

  if(

    confirm(
      "Cancel Reservation?"
    )

  ){

    showToast(
      "Reservation Cancelled"
    );

    console.log(
      "CANCEL RESERVATION"
    );

  }

}

/* =====================================================
   PRINT BOOKING
===================================================== */

function initializePrintButton(){

  const button =
    document.querySelector(
      ".print-btn"
    );

  if(!button) return;

  button.addEventListener(
    "click",
    function(){

      printReservation();

    }
  );

}

function printReservation(){

  window.print();

}

/* =====================================================
   WHATSAPP
===================================================== */

function initializeWhatsAppButton(){

  const button =
    document.querySelector(
      ".whatsapp-btn"
    );

  if(!button) return;

  button.addEventListener(
    "click",
    function(){

      sendWhatsAppConfirmation();

    }
  );

}

function sendWhatsAppConfirmation(){

  showToast(
    "WhatsApp Confirmation Sent"
  );

  console.log(
    "WHATSAPP CONFIRMATION"
  );

}

/* =====================================================
   VALIDATE FORM
===================================================== */

function initializeFormValidation(){

  const inputs =
    document.querySelectorAll(
      ".reservation-form input"
    );

  inputs.forEach(function(input){

    input.addEventListener(
      "keyup",
      function(){

        validateReservation();

      }
    );

  });

}

/* =====================================================
   VALIDATION
===================================================== */

function validateReservation(){

  const guestName =
    document.querySelector(
      'input[placeholder="Guest Name"]'
    );

  const mobile =
    document.querySelector(
      'input[placeholder="Mobile Number"]'
    );

  if(

    !guestName.value.trim()

  ){

    showToast(
      "Guest Name Required"
    );

    return false;

  }

  if(

    !mobile.value.trim()

  ){

    showToast(
      "Mobile Number Required"
    );

    return false;

  }

  return true;

}

/* =====================================================
   LOAD WAITING LIST
===================================================== */

function loadWaitingList(){

  console.log(
    "LOAD WAITING LIST"
  );

}

/* =====================================================
   LOAD RESERVATIONS
===================================================== */

function loadReservations(){

  console.log(
    "LOAD RESERVATIONS"
  );

}

/* =====================================================
   CHECK TABLE AVAILABILITY
===================================================== */

function checkTableAvailability(){

  console.log(
    "CHECK TABLE"
  );

}

/* =====================================================
   AUTO STATUS UPDATE
===================================================== */

function autoUpdateReservationStatus(){

  console.log(
    "AUTO STATUS UPDATE"
  );

}

/* =====================================================
   SHOW TOAST
===================================================== */

function showToast(message){

  const toast =
    document.createElement(
      "div"
    );

  toast.innerHTML =
    message;

  toast.style.position =
    "fixed";

  toast.style.bottom =
    "30px";

  toast.style.right =
    "30px";

  toast.style.background =
    "#0f172a";

  toast.style.color =
    "white";

  toast.style.padding =
    "16px 22px";

  toast.style.borderRadius =
    "16px";

  toast.style.fontWeight =
    "700";

  toast.style.zIndex =
    "99999";

  toast.style.boxShadow =
    "0 10px 25px rgba(0,0,0,.2)";

  document.body.appendChild(
    toast
  );

  setTimeout(function(){

    toast.remove();

  },2000);

}

</script>
