<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Menu Management | Balaji NextGen ERP</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Poppins',sans-serif;
background:#eef5f7;
padding:20px;

}

/* HEADER */

.header{

background:linear-gradient(
135deg,
#2563eb,
#1d4ed8
);

padding:22px;

border-radius:20px;

display:flex;
justify-content:space-between;
align-items:center;

color:white;

margin-bottom:22px;

flex-wrap:wrap;

gap:15px;

}

.header h1{

font-size:30px;

}

.live-clock{

background:white;
color:#111827;

padding:10px 16px;

border-radius:12px;

font-weight:700;

}

/* ACTIONS */

.top-actions{

display:flex;
gap:12px;

margin-bottom:22px;

flex-wrap:wrap;

}

.top-btn{

padding:13px 18px;

border:none;

border-radius:12px;

background:linear-gradient(
135deg,
#0f172a,
#1e293b
);

color:white;

font-weight:700;

cursor:pointer;

transition:.3s;

}

.top-btn:hover{

transform:translateY(-3px);

background:linear-gradient(
135deg,
#2563eb,
#1d4ed8
);

}

/* GRID */

.main-grid{

display:grid;

grid-template-columns:1fr 1.2fr;

gap:22px;

}

/* CARD */

.card{

background:white;

padding:22px;

border-radius:20px;

box-shadow:
0 5px 18px rgba(0,0,0,.06);

}

/* FORM */

.form-group{

margin-bottom:18px;

}

.form-group label{

display:block;

margin-bottom:8px;

font-weight:600;

}

.form-group input,
.form-group select,
.form-group textarea{

width:100%;

padding:14px;

border:1px solid #cbd5e1;

border-radius:12px;

font-size:14px;

outline:none;

}

textarea{
resize:none;
height:100px;
}

/* BUTTON */

.submit-btn{

width:100%;

padding:15px;

border:none;

border-radius:14px;

background:linear-gradient(
135deg,
#10b981,
#059669
);

color:white;

font-size:15px;
font-weight:700;

cursor:pointer;

transition:.3s;

}

.submit-btn:hover{

transform:translateY(-3px);

}

/* MENU LIST */

.menu-list{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:18px;

}

.menu-card{

background:#f8fafc;

border-radius:18px;

overflow:hidden;

border:1px solid #e2e8f0;

transition:.3s;

}

.menu-card:hover{

transform:translateY(-4px);

}

.menu-card img{

width:100%;
height:160px;
object-fit:cover;

}

.menu-content{

padding:16px;

}

.menu-content h2{

font-size:18px;
margin-bottom:8px;

}

.price{

font-size:20px;
font-weight:700;
color:#2563eb;

margin-bottom:10px;

}

.tag{

display:inline-block;

padding:6px 10px;

border-radius:10px;

font-size:11px;
font-weight:700;

margin-bottom:12px;

color:white;

}

.veg{
background:#10b981;
}

.nonveg{
background:#ef4444;
}

.fastfood{
background:#f59e0b;
}

.card-actions{

display:flex;
gap:10px;

}

.edit-btn,
.delete-btn{

flex:1;

padding:10px;

border:none;

border-radius:10px;

font-weight:700;

cursor:pointer;

color:white;

}

.edit-btn{
background:#2563eb;
}

.delete-btn{
background:#ef4444;
}

/* RESPONSIVE */

@media(max-width:992px){

.main-grid{

grid-template-columns:1fr;

}

}

@media(max-width:768px){

.header{

flex-direction:column;
align-items:flex-start;

}

}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

<h1>
📋 Menu Management
</h1>

<div
class="live-clock"
id="liveClock">

00:00:00

</div>

</div>

<!-- ACTIONS -->

<div class="top-actions">

<button
class="top-btn"
onclick="window.location.href='restaurant-dashboard.html'">

🏠 Dashboard

</button>

<button
class="top-btn"
onclick="window.location.href='pos-billing.html'">

🧾 POS Billing

</button>

<button
class="top-btn"
onclick="window.location.href='kitchen-display.html'">

👨‍🍳 Kitchen Display

</button>

<button
class="top-btn"
onclick="window.location.href='online-orders.html'">

🌐 Online Orders

</button>

</div>

<!-- GRID -->

<div class="main-grid">

<!-- LEFT -->

<div class="card">

<h2 style="margin-bottom:20px;">
➕ Add New Menu Item
</h2>

<div class="form-group">

<label>
Item Name
</label>

<input
type="text"
placeholder="Enter Food Name">

</div>

<div class="form-group">

<label>
Category
</label>

<select>

<option>
Pizza
</option>

<option>
Burger
</option>

<option>
Drinks
</option>

<option>
Dessert
</option>

<option>
Chinese
</option>

</select>

</div>

<div class="form-group">

<label>
Food Type
</label>

<select>

<option>
Veg
</option>

<option>
Non-Veg
</option>

<option>
Fast Food
</option>

</select>

</div>

<div class="form-group">

<label>
Price
</label>

<input
type="number"
placeholder="Enter Price">

</div>

<div class="form-group">

<label>
Description
</label>

<textarea
placeholder="Food description..."></textarea>

</div>

<div class="form-group">

<label>
Food Image URL
</label>

<input
type="text"
placeholder="Paste Image URL">

</div>

<button
class="submit-btn">

✅ Save Menu Item

</button>

</div>

<!-- RIGHT -->

<div class="card">

<h2 style="margin-bottom:20px;">
🍽 Current Menu
</h2>

<div class="menu-list">

<!-- ITEM -->

<div class="menu-card">

<img
src="https://images.unsplash.com/photo-1513104890138-7c749659a591"
alt="Pizza">

<div class="menu-content">

<h2>
Veg Pizza
</h2>

<div class="price">
₹299
</div>

<div class="tag veg">
VEG
</div>

<p style="font-size:13px;color:#64748b;margin-bottom:14px;">
Cheese loaded fresh veg pizza.
</p>

<div class="card-actions">

<button class="edit-btn">
EDIT
</button>

<button class="delete-btn">
DELETE
</button>

</div>

</div>

</div>

<!-- ITEM -->

<div class="menu-card">

<img
src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd"
alt="Burger">

<div class="menu-content">

<h2>
Chicken Burger
</h2>

<div class="price">
₹199
</div>

<div class="tag nonveg">
NON-VEG
</div>

<p style="font-size:13px;color:#64748b;margin-bottom:14px;">
Crispy chicken burger combo.
</p>

<div class="card-actions">

<button class="edit-btn">
EDIT
</button>

<button class="delete-btn">
DELETE
</button>

</div>

</div>

</div>

<!-- ITEM -->

<div class="menu-card">

<img
src="https://images.unsplash.com/photo-1551024709-8f23befc6cf7"
alt="Shake">

<div class="menu-content">

<h2>
Cold Coffee
</h2>

<div class="price">
₹149
</div>

<div class="tag fastfood">
DRINK
</div>

<p style="font-size:13px;color:#64748b;margin-bottom:14px;">
Creamy cold coffee with ice cream.
</p>

<div class="card-actions">

<button class="edit-btn">
EDIT
</button>

<button class="delete-btn">
DELETE
</button>

</div>

</div>

</div>

</div>

</div>

</div>

<script>

/* LIVE CLOCK */

setInterval(()=>{

document.getElementById(
"liveClock"
).innerHTML=

new Date().toLocaleTimeString();

},1000);

</script>

</body>
</html>
