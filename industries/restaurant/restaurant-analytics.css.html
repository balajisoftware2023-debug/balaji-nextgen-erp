<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{

  background:#f1f5f9;

  overflow-x:hidden;

  color:#0f172a;

}

/* =====================================================
   PAGE
===================================================== */

.restaurant-analytics-page{

  padding:24px;

  min-height:100vh;

}

/* =====================================================
   TOPBAR
===================================================== */

.analytics-topbar{

  background:white;

  border-radius:28px;

  padding:24px;

  display:flex;

  justify-content:space-between;

  align-items:center;

  gap:20px;

  box-shadow:
  0 10px 30px rgba(0,0,0,.05);

}

.top-left h1{

  font-size:38px;

  font-weight:800;

}

.top-left p{

  margin-top:8px;

  color:#64748b;

}

.top-right{

  display:flex;

  gap:14px;

  flex-wrap:wrap;

}

/* =====================================================
   ACTION BUTTONS
===================================================== */

.action-btn{

  border:none;

  padding:14px 20px;

  border-radius:16px;

  color:white;

  font-size:14px;

  font-weight:700;

  cursor:pointer;

  transition:.3s;

}

.action-btn:hover{

  transform:translateY(-2px);

}

.pdf-btn{

  background:#dc2626;

}

.excel-btn{

  background:#16a34a;

}

.print-btn{

  background:#2563eb;

}

.refresh-btn{

  background:#7c3aed;

}

/* =====================================================
   FILTER SECTION
===================================================== */

.filter-section{

  margin-top:24px;

  background:white;

  border-radius:24px;

  padding:20px;

  display:grid;

  grid-template-columns:
  repeat(4,1fr);

  gap:16px;

  box-shadow:
  0 10px 30px rgba(0,0,0,.05);

}

.filter-section input,
.filter-section select{

  height:56px;

  border:1px solid #cbd5e1;

  border-radius:16px;

  padding:0 16px;

  font-size:14px;

}

/* =====================================================
   KPI GRID
===================================================== */

.kpi-grid{

  margin-top:24px;

  display:grid;

  grid-template-columns:
  repeat(4,1fr);

  gap:22px;

}

/* =====================================================
   KPI CARD
===================================================== */

.kpi-card{

  border-radius:28px;

  padding:24px;

  color:white;

  box-shadow:
  0 10px 24px rgba(0,0,0,.08);

}

.kpi-card span{

  font-size:14px;

  opacity:.9;

}

.kpi-card h2{

  margin-top:12px;

  font-size:42px;

  font-weight:900;

}

.kpi-card p{

  margin-top:10px;

  font-size:13px;

}

.sales-card{

  background:
  linear-gradient(
    135deg,
    #2563eb,
    #1d4ed8
  );

}

.orders-card{

  background:
  linear-gradient(
    135deg,
    #10b981,
    #059669
  );

}

.pax-card{

  background:
  linear-gradient(
    135deg,
    #f59e0b,
    #d97706
  );

}

.avg-card{

  background:
  linear-gradient(
    135deg,
    #7c3aed,
    #6d28d9
  );

}

/* =====================================================
   CHART GRID
===================================================== */

.chart-grid{

  margin-top:24px;

  display:grid;

  grid-template-columns:
  repeat(2,1fr);

  gap:24px;

}

/* =====================================================
   CARD
===================================================== */

.analytics-card{

  background:white;

  border-radius:28px;

  padding:24px;

  box-shadow:
  0 10px 30px rgba(0,0,0,.05);

}

.card-title{

  font-size:22px;

  font-weight:800;

  margin-bottom:22px;

}

/* =====================================================
   CHART PLACEHOLDER
===================================================== */

.chart-placeholder{

  height:280px;

  border-radius:22px;

  background:#f8fafc;

  display:flex;

  align-items:center;

  justify-content:center;

  color:#64748b;

  font-size:18px;

  font-weight:700;

  border:2px dashed #cbd5e1;

}

/* =====================================================
   PERFORMANCE GRID
===================================================== */

.performance-grid{

  margin-top:24px;

  display:grid;

  grid-template-columns:
  repeat(3,1fr);

  gap:24px;

}

/* =====================================================
   REPORT LIST
===================================================== */

.report-list{

  display:flex;

  flex-direction:column;

  gap:16px;

}

.report-row{

  background:#f8fafc;

  border-radius:18px;

  padding:18px;

  display:flex;

  justify-content:space-between;

  align-items:center;

}

/* =====================================================
   REPORT GRID
===================================================== */

.report-grid{

  margin-top:24px;

  display:grid;

  grid-template-columns:
  repeat(3,1fr);

  gap:24px;

}

.summary-row{

  display:flex;

  justify-content:space-between;

  align-items:center;

  padding:16px 0;

  border-bottom:1px dashed #cbd5e1;

}

/* =====================================================
   RESPONSIVE
===================================================== */

@media(max-width:1400px){

  .kpi-grid{

    grid-template-columns:
    repeat(2,1fr);

  }

}

@media(max-width:1200px){

  .chart-grid,
  .performance-grid,
  .report-grid{

    grid-template-columns:1fr;

  }

  .filter-section{

    grid-template-columns:
    repeat(2,1fr);

  }

}

@media(max-width:768px){

  .analytics-topbar{

    flex-direction:column;

    align-items:flex-start;

  }

  .filter-section{

    grid-template-columns:1fr;

  }

  .kpi-grid{

    grid-template-columns:1fr;

  }

}

</style>
