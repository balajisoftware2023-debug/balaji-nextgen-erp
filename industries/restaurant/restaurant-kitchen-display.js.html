<script>

/* =====================================================
   BALAJI NEXTGEN ERP
   KITCHEN DISPLAY ENGINE
===================================================== */

/* =====================================================
   GLOBAL VARIABLES
===================================================== */

let AUTO_REFRESH = null;

let SOUND_ENABLED = true;

/* =====================================================
   PAGE LOAD
===================================================== */

window.onload = function(){

  initializeKDS();

};

/* =====================================================
   INITIALIZE
===================================================== */

function initializeKDS(){

  initializeButtons();

  startRealtimeClock();

  startAutoRefresh();

  monitorDelayedOrders();

  console.log(
    "KITCHEN DISPLAY SYSTEM LOADED"
  );

}

/* =====================================================
   BUTTONS
===================================================== */

function initializeButtons(){

  initializeStartButtons();

  initializeReadyButtons();

  initializeDispatchButtons();

  initializeRecallButtons();

}

/* =====================================================
   START COOKING
===================================================== */

function initializeStartButtons(){

  const buttons =
    document.querySelectorAll(
      ".start-btn"
    );

  buttons.forEach(function(btn){

    btn.addEventListener(
      "click",
      function(){

        const card =
          btn.closest(
            ".order-card"
          );

        startCooking(card);

      }
    );

  });

}

function startCooking(card){

  showToast(
    "Cooking Started"
  );

  card.style.opacity = ".85";

  console.log(
    "START COOKING"
  );

}

/* =====================================================
   MARK READY
===================================================== */

function initializeReadyButtons(){

  const buttons =
    document.querySelectorAll(
      ".ready-btn"
    );

  buttons.forEach(function(btn){

    btn.addEventListener(
      "click",
      function(){

        const card =
          btn.closest(
            ".order-card"
          );

        markReady(card);

      }
    );

  });

}

function markReady(card){

  showToast(
    "Order Ready"
  );

  playAlertSound();

  card.style.opacity = ".8";

  console.log(
    "ORDER READY"
  );

}

/* =====================================================
   DISPATCH
===================================================== */

function initializeDispatchButtons(){

  const buttons =
    document.querySelectorAll(
      ".dispatch-btn"
    );

  buttons.forEach(function(btn){

    btn.addEventListener(
      "click",
      function(){

        const card =
          btn.closest(
            ".order-card"
          );

        dispatchOrder(card);

      }
    );

  });

}

function dispatchOrder(card){

  showToast(
    "Order Dispatched"
  );

  card.style.opacity = ".5";

  setTimeout(function(){

    card.remove();

  },500);

  console.log(
    "DISPATCH ORDER"
  );

}

/* =====================================================
   RECALL
===================================================== */

function initializeRecallButtons(){

  const buttons =
    document.querySelectorAll(
      ".recall-btn"
    );

  buttons.forEach(function(btn){

    btn.addEventListener(
      "click",
      function(){

        recallOrder();

      }
    );

  });

}

function recallOrder(){

  showToast(
    "Order Recalled"
  );

  console.log(
    "RECALL ORDER"
  );

}

/* =====================================================
   LIVE TIMER
===================================================== */

function startRealtimeClock(){

  setInterval(function(){

    const timers =
      document.querySelectorAll(
        ".timer"
      );

    timers.forEach(function(timer){

      if(

        timer.innerText !== "READY"

      ){

        let value =
          timer.innerText;

        let parts =
          value.split(":");

        let mins =
          parseInt(parts[0]);

        let secs =
          parseInt(parts[1]);

        secs++;

        if(secs >= 60){

          mins++;
          secs = 0;

        }

        mins =
          mins.toString()
          .padStart(2,"0");

        secs =
          secs.toString()
          .padStart(2,"0");

        timer.innerText =
          mins + ":" + secs;

      }

    });

  },1000);

}

/* =====================================================
   AUTO REFRESH
===================================================== */

function startAutoRefresh(){

  AUTO_REFRESH =
    setInterval(function(){

      loadKitchenOrders();

      console.log(
        "AUTO REFRESH KDS"
      );

    },30000);

}

/* =====================================================
   DELAY MONITOR
===================================================== */

function monitorDelayedOrders(){

  setInterval(function(){

    const cards =
      document.querySelectorAll(
        ".order-card"
      );

    cards.forEach(function(card){

      const timer =
        card.querySelector(
          ".timer"
        );

      if(!timer) return;

      if(

        timer.innerText === "READY"

      ){

        return;

      }

      const value =
        timer.innerText;

      const mins =
        parseInt(
          value.split(":")[0]
        );

      if(mins >= 15){

        card.style.border =
          "4px solid #dc2626";

        card.style.animation =
          "pulse 1s infinite";

      }

    });

  },5000);

}

/* =====================================================
   LOAD ORDERS
===================================================== */

function loadKitchenOrders(){

  console.log(
    "LOAD KITCHEN ORDERS"
  );

  /*
  google.script.run
    .withSuccessHandler(
      renderKitchenOrders
    )
    .getKitchenOrders();
  */

}

/* =====================================================
   RENDER ORDERS
===================================================== */

function renderKitchenOrders(data){

  console.log(
    data
  );

}

/* =====================================================
   SOUND ALERT
===================================================== */

function playAlertSound(){

  if(!SOUND_ENABLED){

    return;

  }

  console.log(
    "PLAY ALERT SOUND"
  );

}

/* =====================================================
   TOAST
===================================================== */

function showToast(message){

  const toast =
    document.createElement(
      "div"
    );

  toast.innerHTML =
    message;

  toast.style.position =
    "fixed";

  toast.style.bottom =
    "30px";

  toast.style.right =
    "30px";

  toast.style.background =
    "#0f172a";

  toast.style.color =
    "white";

  toast.style.padding =
    "16px 22px";

  toast.style.borderRadius =
    "16px";

  toast.style.fontWeight =
    "700";

  toast.style.zIndex =
    "99999";

  toast.style.boxShadow =
    "0 10px 25px rgba(0,0,0,.2)";

  document.body.appendChild(
    toast
  );

  setTimeout(function(){

    toast.remove();

  },2000);

}

/* =====================================================
   PULSE ANIMATION
===================================================== */

const style =
  document.createElement(
    "style"
  );

style.innerHTML =

`
@keyframes pulse{

  0%{
    transform:scale(1);
  }

  50%{
    transform:scale(1.02);
  }

  100%{
    transform:scale(1);
  }

}
`;

document.head.appendChild(
  style
);

</script>
