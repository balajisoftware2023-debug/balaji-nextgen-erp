<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>

        BALAJI NEXTGEN ERP

    </title>

    <!-- =====================================================
    CSS
    ===================================================== -->

    <link
        rel="stylesheet"
        href="css/global/global.css"
    >

    <link
        rel="stylesheet"
        href="css/dashboard/dashboard.css"
    >

    <link
        rel="stylesheet"
        href="css/responsive/responsive.css"
    >

</head>

<body>

    <!-- =====================================================
    MAIN ERP CONTAINER
    ===================================================== -->

    <div class="erp-container">

        <!-- =================================================
        SIDEBAR
        ================================================== -->

        <div id="sidebarContainer"></div>

        <!-- =================================================
        MAIN CONTENT AREA
        ================================================== -->

        <div class="erp-main">

            <!-- =============================================
            TOPBAR
            ============================================== -->

            <div id="topbarContainer"></div>

            <!-- =============================================
            PAGE CONTENT
            ============================================== -->

            <main
                class="erp-content"
                id="erpContent"
            >

                <!-- DEFAULT DASHBOARD -->

                <div class="dashboard-welcome">

                    <h1>

                        BALAJI NEXTGEN ERP

                    </h1>

                    <p>

                        Enterprise Multi-Industry ERP Platform

                    </p>

                </div>

            </main>

        </div>

    </div>

    <!-- =====================================================
    CONFIG
    ===================================================== -->

    <script src="config/app-config.js"></script>

    <!-- =====================================================
    SESSION
    ===================================================== -->

    <script src="session/session-engine.js"></script>

    <!-- =====================================================
    API ROUTER
    ===================================================== -->

    <script src="api/api-router.js"></script>

    <!-- =====================================================
    ROUTER
    ===================================================== -->

    <script src="js/core/router.js"></script>

    <!-- =====================================================
    UI ENGINE
    ===================================================== -->

    <script src="js/core/ui-engine.js"></script>

    <!-- =====================================================
    LOAD LAYOUTS
    ===================================================== -->

    <script>

        checkSession();

        async function loadLayouts(){

            /* =============================================
            SIDEBAR
            ============================================== */

            const sidebar =
            await fetch(
                'layouts/sidebar/sidebar.html'
            );

            document
            .getElementById(
                'sidebarContainer'
            )
            .innerHTML =
            await sidebar.text();

            /* =============================================
            TOPBAR
            ============================================== */

            const topbar =
            await fetch(
                'layouts/topbar/topbar.html'
            );

            document
            .getElementById(
                'topbarContainer'
            )
            .innerHTML =
            await topbar.text();

        }

        loadLayouts();

    </script>

</body>

</html>
