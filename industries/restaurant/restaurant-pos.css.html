<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{

  background:#f4f7fb;

  overflow:hidden;

}

/* =====================================================
   MAIN LAYOUT
===================================================== */

.restaurant-pos-page{

  display:flex;

  height:100vh;

}

/* =====================================================
   SIDEBAR
===================================================== */

.sidebar{

  width:230px;

  background:#08142f;

  color:white;

  padding:20px;

  overflow-y:auto;

}

.brand-section{

  display:flex;

  align-items:center;

  gap:14px;

  margin-bottom:35px;

}

.brand-logo{

  width:60px;
  height:60px;

  border-radius:18px;

  background:#ff6b00;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:28px;

}

.brand-text h2{

  font-size:26px;

  color:white;

}

.brand-text h3{

  color:#3b82f6;

}

.brand-text p{

  color:#cbd5e1;

  font-size:13px;

}

.sidebar-title{

  color:#64748b;

  font-size:13px;

  margin-bottom:18px;

  letter-spacing:1px;

}

.category-list{

  display:flex;

  flex-direction:column;

  gap:12px;

}

.category-btn{

  border:none;

  background:#0f1f45;

  color:white;

  padding:18px;

  border-radius:16px;

  text-align:left;

  cursor:pointer;

  transition:.3s;

  font-size:15px;

  font-weight:600;

}

.category-btn:hover{

  background:#1d4ed8;

}

.category-btn.active{

  background:#1d4ed8;

}

/* =====================================================
   MAIN CONTENT
===================================================== */

.main-content{

  flex:1;

  padding:22px;

  overflow-y:auto;

}

/* =====================================================
   TOPBAR
===================================================== */

.topbar{

  display:flex;

  justify-content:space-between;

  align-items:center;

  gap:20px;

}

.search-box{

  flex:1;

}

.search-box input{

  width:100%;

  height:55px;

  border:none;

  border-radius:18px;

  padding:0 20px;

  font-size:16px;

  background:white;

}

.top-actions{

  display:flex;

  gap:12px;

}

.top-chip{

  background:white;

  padding:14px 20px;

  border-radius:16px;

  font-weight:600;

  color:#0f172a;

}

/* =====================================================
   SECTION
===================================================== */

.section-title{

  margin-top:28px;

  margin-bottom:18px;

  font-size:20px;

  font-weight:800;

  color:#0f172a;

}

/* =====================================================
   TABLE GRID
===================================================== */

.table-grid{

  display:grid;

  grid-template-columns:
  repeat(6,1fr);

  gap:18px;

}

.table-card{

  border-radius:22px;

  padding:28px 10px;

  text-align:center;

  color:white;

}

.table-card h2{

  font-size:36px;

}

.table-card p{

  margin-top:10px;

  opacity:.9;

}

.available{

  background:#0f766e;

}

.occupied{

  background:#991b1b;

}

.reserved{

  background:#a16207;

}

.billing{

  background:#1d4ed8;

}

/* =====================================================
   MENU GRID
===================================================== */

.menu-grid{

  display:grid;

  grid-template-columns:
  repeat(auto-fill,minmax(260px,1fr));

  gap:22px;

}

.menu-card{

  background:white;

  border-radius:24px;

  overflow:hidden;

  box-shadow:
  0 10px 30px rgba(0,0,0,.06);

}

.menu-card img{

  width:100%;

  height:190px;

  object-fit:cover;

}

.menu-content{

  padding:18px;

}

.menu-content h3{

  font-size:24px;

  color:#0f172a;

}

.menu-content h2{

  margin-top:12px;

  color:#1d4ed8;

  font-size:42px;

}

.menu-footer{

  margin-top:16px;

  display:flex;

  justify-content:space-between;

  align-items:center;

}

.veg-tag{

  background:#dcfce7;

  color:#166534;

  padding:8px 12px;

  border-radius:10px;

  font-size:12px;

  font-weight:700;

}

.add-btn{

  border:none;

  background:#1d4ed8;

  color:white;

  padding:12px 22px;

  border-radius:14px;

  font-weight:700;

  cursor:pointer;

}

/* =====================================================
   BILLING PANEL
===================================================== */

.billing-panel{

  width:360px;

  background:white;

  padding:22px;

  border-left:1px solid #e2e8f0;

  overflow-y:auto;

}

.billing-header{

  font-size:42px;

  font-weight:800;

  color:#0f172a;

  margin-bottom:20px;

}

.customer-form{

  display:flex;

  flex-direction:column;

  gap:14px;

}

.customer-form input{

  height:54px;

  border:1px solid #cbd5e1;

  border-radius:16px;

  padding:0 16px;

}

.bill-items{

  margin-top:26px;

}

.bill-item{

  display:flex;

  justify-content:space-between;

  align-items:center;

  padding:16px;

  border-radius:18px;

  background:#f8fafc;

}

.bill-controls{

  display:flex;

  align-items:center;

  gap:10px;

}

.bill-controls button{

  width:34px;
  height:34px;

  border:none;

  border-radius:10px;

  background:#1d4ed8;

  color:white;

  cursor:pointer;

}

.delete-btn{

  background:#991b1b !important;

}

.bill-summary{

  margin-top:28px;

}

.summary-row{

  display:flex;

  justify-content:space-between;

  margin-bottom:14px;

}

.total-row{

  margin-top:24px;

}

.total-row h1{

  color:#1d4ed8;

  font-size:48px;

}

.billing-buttons{

  margin-top:28px;

  display:grid;

  grid-template-columns:1fr 1fr;

  gap:14px;

}

.billing-buttons button{

  border:none;

  height:56px;

  border-radius:16px;

  color:white;

  font-size:16px;

  font-weight:700;

  cursor:pointer;

}

.print-btn{

  background:#1e3a8a;

}

.kot-btn{

  background:#9a3412;

}

.pay-btn{

  background:#047857;

}

.clear-btn{

  background:#991b1b;

}

/* =====================================================
   SETTLEMENT MODAL
===================================================== */

.settlement-modal{

  position:fixed;

  inset:0;

  background:rgba(15,23,42,.55);

  display:flex;

  align-items:center;

  justify-content:center;

  z-index:999;

}

.settlement-box{

  width:460px;

  background:white;

  border-radius:30px;

  padding:28px;

  position:relative;

}

.close-btn{

  position:absolute;

  top:20px;
  right:20px;

  width:42px;
  height:42px;

  border:none;

  border-radius:14px;

  background:#ef4444;

  color:white;

  font-size:24px;

  cursor:pointer;

}

.settlement-box h1{

  font-size:52px;

  color:#0f172a;

}

.settlement-info{

  margin-top:22px;

  padding:22px;

  border:1px solid #cbd5e1;

  border-radius:20px;

}

.info-row{

  display:flex;

  justify-content:space-between;

  margin-bottom:16px;

}

.payment-title{

  margin-top:26px;

  font-size:20px;

  font-weight:700;

}

.payment-methods{

  margin-top:16px;

  display:grid;

  grid-template-columns:1fr 1fr 1fr;

  gap:14px;

}

.method-btn{

  border:none;

  height:52px;

  border-radius:16px;

  background:#f1f5f9;

  font-weight:700;

  cursor:pointer;

}

.method-btn.active{

  background:#2563eb;

  color:white;

}

.payment-inputs{

  margin-top:18px;

  display:flex;

  flex-direction:column;

  gap:14px;

}

.payment-inputs input{

  height:56px;

  border:1px solid #cbd5e1;

  border-radius:16px;

  padding:0 16px;

}

.settlement-total{

  margin-top:20px;

  background:#ecfeff;

  padding:18px;

  border-radius:18px;

  display:flex;

  justify-content:space-between;

  font-size:24px;

  font-weight:800;

  color:#0891b2;

}

.settlement-footer{

  margin-top:20px;

  display:grid;

  grid-template-columns:1fr 1fr;

  gap:14px;

}

.cancel-btn{

  height:56px;

  border:none;

  border-radius:18px;

  background:#cbd5e1;

  font-size:18px;

  font-weight:700;

}

.confirm-btn{

  height:56px;

  border:none;

  border-radius:18px;

  background:#10b981;

  color:white;

  font-size:18px;

  font-weight:700;

}

/* =====================================================
   RESPONSIVE
===================================================== */

@media(max-width:1400px){

  .table-grid{

    grid-template-columns:
    repeat(3,1fr);

  }

}

@media(max-width:1100px){

  .billing-panel{

    display:none;

  }

}

@media(max-width:900px){

  .restaurant-pos-page{

    flex-direction:column;

  }

  .sidebar{

    width:100%;

    display:flex;

    overflow-x:auto;

    gap:14px;

  }

}

</style>
