<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{

  background:#f1f5f9;

  overflow:hidden;

  color:#0f172a;

}

/* =====================================================
   PAGE
===================================================== */

.restaurant-kds-page{

  padding:24px;

  height:100vh;

  display:flex;

  flex-direction:column;

}

/* =====================================================
   TOPBAR
===================================================== */

.kds-topbar{

  background:white;

  border-radius:28px;

  padding:24px;

  display:flex;

  justify-content:space-between;

  align-items:center;

  gap:20px;

  box-shadow:
  0 10px 30px rgba(0,0,0,.05);

}

.top-left h1{

  font-size:38px;

  font-weight:800;

  color:#0f172a;

}

.top-left p{

  margin-top:8px;

  color:#64748b;

}

.top-right{

  display:flex;

  gap:18px;

  flex-wrap:wrap;

}

/* =====================================================
   STATUS BOX
===================================================== */

.top-box{

  min-width:140px;

  padding:18px;

  border-radius:22px;

  color:white;

  text-align:center;

}

.top-box span{

  font-size:13px;

  opacity:.9;

}

.top-box h2{

  margin-top:10px;

  font-size:42px;

  font-weight:800;

}

.pending-box{

  background:
  linear-gradient(
    135deg,
    #f97316,
    #ea580c
  );

}

.preparing-box{

  background:
  linear-gradient(
    135deg,
    #2563eb,
    #1d4ed8
  );

}

.ready-box{

  background:
  linear-gradient(
    135deg,
    #10b981,
    #059669
  );

}

.delayed-box{

  background:
  linear-gradient(
    135deg,
    #ef4444,
    #dc2626
  );

}

/* =====================================================
   BOARD
===================================================== */

.kds-board{

  margin-top:24px;

  flex:1;

  display:grid;

  grid-template-columns:
  repeat(3,1fr);

  gap:22px;

  overflow:hidden;

}

/* =====================================================
   COLUMN
===================================================== */

.kds-column{

  background:white;

  border-radius:28px;

  padding:20px;

  overflow-y:auto;

  box-shadow:
  0 10px 30px rgba(0,0,0,.05);

}

.column-header{

  padding:18px;

  border-radius:18px;

  color:white;

  text-align:center;

  font-size:22px;

  font-weight:800;

  margin-bottom:22px;

}

.pending-header{

  background:#f97316;

}

.preparing-header{

  background:#2563eb;

}

.ready-header{

  background:#10b981;

}

/* =====================================================
   ORDER CARD
===================================================== */

.order-card{

  border-radius:24px;

  padding:22px;

  margin-bottom:22px;

  color:white;

  position:relative;

  overflow:hidden;

  box-shadow:
  0 10px 20px rgba(0,0,0,.08);

}

.order-card::before{

  content:'';

  position:absolute;

  top:0;

  left:-100%;

  width:100%;

  height:100%;

  background:
  linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,.15),
    transparent
  );

  transition:.8s;

}

.order-card:hover::before{

  left:100%;

}

/* =====================================================
   PRIORITY COLORS
===================================================== */

.normal-priority{

  background:
  linear-gradient(
    135deg,
    #2563eb,
    #1d4ed8
  );

}

.high-priority{

  background:
  linear-gradient(
    135deg,
    #f59e0b,
    #d97706
  );

}

.preparing-priority{

  background:
  linear-gradient(
    135deg,
    #0ea5e9,
    #0284c7
  );

}

.ready-priority{

  background:
  linear-gradient(
    135deg,
    #10b981,
    #059669
  );

}

/* =====================================================
   TOP SECTION
===================================================== */

.order-top{

  display:flex;

  justify-content:space-between;

  align-items:center;

}

.order-top h2{

  font-size:28px;

  font-weight:800;

}

.timer{

  background:rgba(255,255,255,.2);

  padding:10px 14px;

  border-radius:14px;

  font-size:13px;

  font-weight:700;

}

/* =====================================================
   ORDER INFO
===================================================== */

.order-info{

  margin-top:20px;

  line-height:32px;

  font-size:15px;

}

/* =====================================================
   ITEMS
===================================================== */

.order-items{

  margin-top:20px;

  background:rgba(255,255,255,.12);

  border-radius:18px;

  padding:18px;

}

.order-items ul{

  padding-left:18px;

}

.order-items li{

  margin-bottom:10px;

  line-height:1.6;

}

/* =====================================================
   ACTIONS
===================================================== */

.order-actions{

  margin-top:22px;

  display:flex;

  gap:12px;

  flex-wrap:wrap;

}

.order-actions button{

  flex:1;

  border:none;

  height:52px;

  border-radius:16px;

  background:white;

  font-size:14px;

  font-weight:800;

  cursor:pointer;

  transition:.3s;

}

.order-actions button:hover{

  transform:translateY(-2px);

}

.start-btn{

  color:#ea580c;

}

.ready-btn{

  color:#2563eb;

}

.dispatch-btn{

  color:#10b981;

}

.recall-btn{

  color:#dc2626;

}

/* =====================================================
   SCROLLBAR
===================================================== */

::-webkit-scrollbar{

  width:8px;

}

::-webkit-scrollbar-thumb{

  background:#cbd5e1;

  border-radius:20px;

}

/* =====================================================
   RESPONSIVE
===================================================== */

@media(max-width:1300px){

  .kds-board{

    grid-template-columns:1fr;

  }

}

@media(max-width:768px){

  .kds-topbar{

    flex-direction:column;

    align-items:flex-start;

  }

  .top-right{

    width:100%;

    overflow-x:auto;

  }

}

</style>
