<script>

/* =====================================================
   BALAJI NEXTGEN ERP
   RESTAURANT SETTINGS ENGINE
===================================================== */

/* =====================================================
   GLOBAL VARIABLES
===================================================== */

let SETTINGS_DATA = {};

let AUTO_SAVE = false;

/* =====================================================
   PAGE LOAD
===================================================== */

window.onload = function(){

  initializeSettings();

};

/* =====================================================
   INITIALIZE
===================================================== */

function initializeSettings(){

  initializeButtons();

  initializeInputs();

  loadSettings();

  console.log(
    "SETTINGS ENGINE LOADED"
  );

}

/* =====================================================
   BUTTONS
===================================================== */

function initializeButtons(){

  initializeSaveButton();

  initializeBackupButton();

  initializeSyncButton();

  initializeQuickButtons();

}

/* =====================================================
   SAVE SETTINGS
===================================================== */

function initializeSaveButton(){

  const button =
    document.querySelector(
      ".save-btn"
    );

  if(!button) return;

  button.addEventListener(
    "click",
    function(){

      saveSettings();

    }
  );

}

function saveSettings(){

  showToast(
    "Settings Saved Successfully"
  );

  console.log(
    "SAVE SETTINGS"
  );

  /*
  google.script.run
    .withSuccessHandler(
      function(response){

      }
    )
    .saveRestaurantSettings();
  */

}

/* =====================================================
   BACKUP
===================================================== */

function initializeBackupButton(){

  const button =
    document.querySelector(
      ".backup-btn"
    );

  if(!button) return;

  button.addEventListener(
    "click",
    function(){

      backupData();

    }
  );

}

function backupData(){

  showToast(
    "System Backup Started"
  );

  console.log(
    "BACKUP DATA"
  );

}

/* =====================================================
   SYNC CONFIG
===================================================== */

function initializeSyncButton(){

  const button =
    document.querySelector(
      ".sync-btn"
    );

  if(!button) return;

  button.addEventListener(
    "click",
    function(){

      syncConfiguration();

    }
  );

}

function syncConfiguration(){

  showToast(
    "Configuration Synced"
  );

  console.log(
    "SYNC CONFIGURATION"
  );

}

/* =====================================================
   QUICK BUTTONS
===================================================== */

function initializeQuickButtons(){

  const buttons =
    document.querySelectorAll(
      ".quick-btn"
    );

  buttons.forEach(function(btn){

    btn.addEventListener(
      "click",
      function(){

        const action =
          btn.innerText.trim();

        handleQuickAction(
          action
        );

      }
    );

  });

}

function handleQuickAction(action){

  showToast(
    action
  );

  console.log(
    "QUICK ACTION",
    action
  );

}

/* =====================================================
   INPUTS
===================================================== */

function initializeInputs(){

  const inputs =
    document.querySelectorAll(
      "input, select, textarea"
    );

  inputs.forEach(function(input){

    input.addEventListener(
      "change",
      function(){

        if(AUTO_SAVE){

          saveSettings();

        }

      }
    );

  });

}

/* =====================================================
   LOAD SETTINGS
===================================================== */

function loadSettings(){

  console.log(
    "LOAD SETTINGS DATA"
  );

  /*
  google.script.run
    .withSuccessHandler(
      renderSettings
    )
    .getRestaurantSettings();
  */

}

/* =====================================================
   RENDER SETTINGS
===================================================== */

function renderSettings(data){

  SETTINGS_DATA = data;

  console.log(
    SETTINGS_DATA
  );

}

/* =====================================================
   BILLING SETTINGS
===================================================== */

function updateBillingSettings(){

  console.log(
    "UPDATE BILLING SETTINGS"
  );

}

/* =====================================================
   PRINTER SETTINGS
===================================================== */

function testPrinter(){

  showToast(
    "Printer Test Started"
  );

  console.log(
    "TEST PRINTER"
  );

}

function updatePrinterConfiguration(){

  console.log(
    "UPDATE PRINTER CONFIG"
  );

}

/* =====================================================
   USER SECURITY
===================================================== */

function updateUserPermissions(){

  console.log(
    "UPDATE USER PERMISSIONS"
  );

}

function updatePasswordPolicy(){

  console.log(
    "UPDATE PASSWORD POLICY"
  );

}

/* =====================================================
   THEME SETTINGS
===================================================== */

function changeTheme(){

  console.log(
    "CHANGE THEME"
  );

}

function uploadLogo(){

  console.log(
    "UPLOAD LOGO"
  );

}

/* =====================================================
   RESTORE & RESET
===================================================== */

function restoreBackup(){

  showToast(
    "Restore Backup Started"
  );

  console.log(
    "RESTORE BACKUP"
  );

}

function resetSettings(){

  if(

    confirm(
      "Reset All Settings?"
    )

  ){

    showToast(
      "Settings Reset"
    );

    console.log(
      "RESET SETTINGS"
    );

  }

}

/* =====================================================
   TOAST
===================================================== */

function showToast(message){

  const toast =
    document.createElement(
      "div"
    );

  toast.innerHTML =
    message;

  toast.style.position =
      "fixed";

  toast.style.bottom =
      "30px";

  toast.style.right =
      "30px";

  toast.style.background =
      "#0f172a";

  toast.style.color =
      "white";

  toast.style.padding =
      "16px 22px";

  toast.style.borderRadius =
      "16px";

  toast.style.fontWeight =
      "700";

  toast.style.zIndex =
      "99999";

  toast.style.boxShadow =
      "0 10px 25px rgba(0,0,0,.2)";

  document.body.appendChild(
    toast
  );

  setTimeout(function(){

    toast.remove();

  },2000);

}

</script>
