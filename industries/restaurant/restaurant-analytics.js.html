/* =====================================================

===================================================== */

window.onload = function(){

  initializeAnalytics();

/* =====================================================
   INITIALIZE
===================================================== */

function initializeAnalytics(){

  initializeButtons();

  initializeFilters();

  loadAnalytics();

  startAutoRefresh();

  console.log(
    "ANALYTICS ENGINE LOADED"
  );

}

/* =====================================================
   BUTTONS
===================================================== */

function initializeButtons(){

  initializePDFButton();

  initializeExcelButton();

  initializePrintButton();

  initializeRefreshButton();

}

/* =====================================================
   EXPORT PDF
===================================================== */

function initializePDFButton(){

  const button =
    document.querySelector(
      ".pdf-btn"
    );

  if(!button) return;

  button.addEventListener(
    "click",
    function(){

      exportPDF();

    }
  );

}

function exportPDF(){

  showToast(
    "PDF Export Started"
  );

  console.log(
    "EXPORT PDF"
  );

}

/* =====================================================

===================================================== */

function initializeRefreshButton(){

  const button =

    );

  if(!button) return;

  button.addEventListener(
    "click",
    function(){

      refreshAnalytics();

    }
  );

}

function refreshAnalytics(){

  loadAnalytics();

  showToast(
    "Analytics Refreshed"
  );

}

/* =====================================================
   FILTERS
===================================================== */

function initializeFilters(){

  const filters =
    document.querySelectorAll(
      ".filter-section select, .filter-section input"
    );

  filters.forEach(function(filter){

    filter.addEventListener(
      "change",
      function(){

        applyFilters();

      }
    );

  });

}

function applyFilters(){

  showToast(
    "Filters Applied"
  );

  console.log(

}

/* =====================================================
   TOAST
===================================================== */

function showToast(message){

  const toast =
    document.createElement(
      "div"
    );

  toast.innerHTML =
    message;

  toast.style.position =
    "fixed";

  toast.style.bottom =
    "30px";

  toast.style.right =
    "30px";

  toast.style.background =
    "#0f172a";

  toast.style.color =
    "white";

  toast.style.padding =
    "16px 22px";

  toast.style.borderRadius =
    "16px";

  toast.style.fontWeight =
    "700";

  toast.style.zIndex =
    "99999";

  toast.style.boxShadow =
    "0 10px 25px rgba(0,0,0,.2)";

  document.body.appendChild(
    toast
  );

  setTimeout(function(){

    toast.remove();

  },2000);

}
