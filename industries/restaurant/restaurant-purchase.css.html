<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{

  background:#f1f5f9;

  overflow-x:hidden;

  color:#0f172a;

}

/* =====================================================
   PAGE
===================================================== */

.restaurant-purchase-page{

  padding:24px;

  min-height:100vh;

}

/* =====================================================
   TOPBAR
===================================================== */

.purchase-topbar{

  background:white;

  border-radius:28px;

  padding:24px;

  display:flex;

  justify-content:space-between;

  align-items:center;

  gap:20px;

  box-shadow:
  0 10px 30px rgba(0,0,0,.05);

}

.top-left h1{

  font-size:38px;

  font-weight:800;

}

.top-left p{

  margin-top:8px;

  color:#64748b;

}

.top-right{

  display:flex;

  gap:14px;

  flex-wrap:wrap;

}

/* =====================================================
   ACTION BUTTONS
===================================================== */

.action-btn{

  border:none;

  padding:14px 20px;

  border-radius:16px;

  color:white;

  font-size:14px;

  font-weight:700;

  cursor:pointer;

  transition:.3s;

}

.action-btn:hover{

  transform:translateY(-2px);

}

.create-btn{

  background:#2563eb;

}

.approve-btn{

  background:#10b981;

}

.grn-btn{

  background:#f97316;

}

.export-btn{

  background:#7c3aed;

}

/* =====================================================
   KPI GRID
===================================================== */

.kpi-grid{

  margin-top:24px;

  display:grid;

  grid-template-columns:
  repeat(4,1fr);

  gap:22px;

}

/* =====================================================
   KPI CARD
===================================================== */

.kpi-card{

  border-radius:28px;

  padding:24px;

  color:white;

  box-shadow:
  0 10px 24px rgba(0,0,0,.08);

}

.kpi-card span{

  font-size:14px;

  opacity:.9;

}

.kpi-card h2{

  margin-top:12px;

  font-size:40px;

  font-weight:900;

}

.kpi-card p{

  margin-top:10px;

  font-size:13px;

}

.purchase-card{

  background:
  linear-gradient(
    135deg,
    #2563eb,
    #1d4ed8
  );

}

.po-card{

  background:
  linear-gradient(
    135deg,
    #f59e0b,
    #d97706
  );

}

.grn-card{

  background:
  linear-gradient(
    135deg,
    #10b981,
    #059669
  );

}

.vendor-card{

  background:
  linear-gradient(
    135deg,
    #7c3aed,
    #6d28d9
  );

}

/* =====================================================
   FILTER SECTION
===================================================== */

.filter-section{

  margin-top:24px;

  background:white;

  border-radius:24px;

  padding:20px;

  display:grid;

  grid-template-columns:
  repeat(5,1fr);

  gap:16px;

  box-shadow:
  0 10px 30px rgba(0,0,0,.05);

}

.filter-section select,
.filter-section input{

  height:56px;

  border:1px solid #cbd5e1;

  border-radius:16px;

  padding:0 16px;

  font-size:14px;

}

/* =====================================================
   FORM CARD
===================================================== */

.purchase-form-card{

  margin-top:24px;

  background:white;

  border-radius:28px;

  padding:24px;

  box-shadow:
  0 10px 30px rgba(0,0,0,.05);

}

.card-title{

  font-size:24px;

  font-weight:800;

  margin-bottom:24px;

}

/* =====================================================
   FORM
===================================================== */

.purchase-form{

  display:grid;

  grid-template-columns:
  repeat(2,1fr);

  gap:18px;

}

.purchase-form input,
.purchase-form select{

  height:58px;

  border:1px solid #cbd5e1;

  border-radius:16px;

  padding:0 18px;

  font-size:14px;

}

.purchase-form textarea{

  grid-column:span 2;

  height:120px;

  border:1px solid #cbd5e1;

  border-radius:16px;

  padding:18px;

  resize:none;

  font-size:14px;

}

/* =====================================================
   TABLE CARD
===================================================== */

.purchase-table-card{

  margin-top:24px;

  background:white;

  border-radius:28px;

  padding:24px;

  overflow-x:auto;

  box-shadow:
  0 10px 30px rgba(0,0,0,.05);

}

.table-title{

  font-size:24px;

  font-weight:800;

  margin-bottom:24px;

}

/* =====================================================
   PURCHASE TABLE
===================================================== */

.purchase-table{

  min-width:1000px;

}

.purchase-header{

  display:grid;

  grid-template-columns:
  2fr .8fr .8fr .9fr .8fr 1fr 1fr 1fr;

  gap:14px;

  padding:18px;

  border-radius:18px;

  background:#eff6ff;

  color:#2563eb;

  font-weight:800;

}

.purchase-row{

  display:grid;

  grid-template-columns:
  2fr .8fr .8fr .9fr .8fr 1fr 1fr 1fr;

  gap:14px;

  padding:18px;

  align-items:center;

  border-bottom:1px solid #e2e8f0;

}

/* =====================================================
   APPROVAL GRID
===================================================== */

.approval-grid{

  margin-top:24px;

  display:grid;

  grid-template-columns:
  repeat(5,1fr);

  gap:20px;

}

.approval-card{

  border-radius:24px;

  padding:22px;

  color:white;

  text-align:center;

}

.approval-card span{

  font-size:14px;

}

.approval-card h2{

  margin-top:12px;

  font-size:42px;

  font-weight:900;

}

.draft-card{

  background:#64748b;

}

.pending-card{

  background:#f59e0b;

}

.approved-card{

  background:#10b981;

}

.rejected-card{

  background:#ef4444;

}

.completed-card{

  background:#2563eb;

}

/* =====================================================
   QUICK ACTION GRID
===================================================== */

.quick-action-grid{

  margin-top:24px;

  display:grid;

  grid-template-columns:
  repeat(3,1fr);

  gap:20px;

}

.quick-btn{

  border:none;

  height:64px;

  border-radius:20px;

  background:white;

  font-size:15px;

  font-weight:800;

  cursor:pointer;

  transition:.3s;

  box-shadow:
  0 10px 24px rgba(0,0,0,.05);

}

.quick-btn:hover{

  transform:translateY(-2px);

  background:#eff6ff;

}

/* =====================================================
   MODULE GRID
===================================================== */

.module-grid{

  margin-top:24px;

  display:grid;

  grid-template-columns:
  repeat(4,1fr);

  gap:22px;

}

.module-card{

  background:white;

  border-radius:24px;

  padding:24px;

  box-shadow:
  0 10px 30px rgba(0,0,0,.05);

}

.module-card h3{

  font-size:22px;

  margin-bottom:14px;

}

.module-card p{

  color:#64748b;

  line-height:1.7;

}

/* =====================================================
   RESPONSIVE
===================================================== */

@media(max-width:1400px){

  .kpi-grid,
  .approval-grid{

    grid-template-columns:
    repeat(2,1fr);

  }

  .module-grid{

    grid-template-columns:
    repeat(2,1fr);

  }

}

@media(max-width:1200px){

  .filter-section{

    grid-template-columns:
    repeat(2,1fr);

  }

  .quick-action-grid{

    grid-template-columns:
    repeat(2,1fr);

  }

}

@media(max-width:768px){

  .purchase-topbar{

    flex-direction:column;

    align-items:flex-start;

  }

  .filter-section,
  .purchase-form,
  .approval-grid,
  .quick-action-grid,
  .module-grid{

    grid-template-columns:1fr;

  }

  .purchase-form textarea{

    grid-column:span 1;

  }

}

</style>
