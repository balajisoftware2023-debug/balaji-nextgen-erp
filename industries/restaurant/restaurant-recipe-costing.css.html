<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{

  background:#f1f5f9;

  overflow-x:hidden;

  color:#0f172a;

}

/* =====================================================
   PAGE
===================================================== */

.restaurant-recipe-page{

  padding:24px;

  min-height:100vh;

}

/* =====================================================
   TOPBAR
===================================================== */

.recipe-topbar{

  background:white;

  border-radius:28px;

  padding:24px;

  display:flex;

  justify-content:space-between;

  align-items:center;

  gap:20px;

  box-shadow:
  0 10px 30px rgba(0,0,0,.05);

}

.top-left h1{

  font-size:38px;

  font-weight:800;

}

.top-left p{

  margin-top:8px;

  color:#64748b;

}

.top-right{

  display:flex;

  gap:14px;

  flex-wrap:wrap;

}

/* =====================================================
   ACTION BUTTONS
===================================================== */

.action-btn{

  border:none;

  padding:14px 20px;

  border-radius:16px;

  color:white;

  font-size:14px;

  font-weight:700;

  cursor:pointer;

  transition:.3s;

}

.action-btn:hover{

  transform:translateY(-2px);

}

.create-btn{

  background:#2563eb;

}

.calculate-btn{

  background:#10b981;

}

.export-btn{

  background:#7c3aed;

}

.print-btn{

  background:#f97316;

}

/* =====================================================
   KPI GRID
===================================================== */

.kpi-grid{

  margin-top:24px;

  display:grid;

  grid-template-columns:
  repeat(4,1fr);

  gap:22px;

}

/* =====================================================
   KPI CARD
===================================================== */

.kpi-card{

  border-radius:28px;

  padding:24px;

  color:white;

  box-shadow:
  0 10px 24px rgba(0,0,0,.08);

}

.kpi-card span{

  font-size:14px;

  opacity:.9;

}

.kpi-card h2{

  margin-top:12px;

  font-size:36px;

  font-weight:900;

}

.kpi-card p{

  margin-top:10px;

  font-size:13px;

}

.recipe-card{

  background:
  linear-gradient(
    135deg,
    #2563eb,
    #1d4ed8
  );

}

.cost-card{

  background:
  linear-gradient(
    135deg,
    #10b981,
    #059669
  );

}

.highcost-card{

  background:
  linear-gradient(
    135deg,
    #ef4444,
    #dc2626
  );

}

.profit-card{

  background:
  linear-gradient(
    135deg,
    #7c3aed,
    #6d28d9
  );

}

/* =====================================================
   FILTER SECTION
===================================================== */

.filter-section{

  margin-top:24px;

  background:white;

  border-radius:24px;

  padding:20px;

  display:grid;

  grid-template-columns:
  repeat(5,1fr);

  gap:16px;

  box-shadow:
  0 10px 30px rgba(0,0,0,.05);

}

.filter-section select,
.filter-section input{

  height:56px;

  border:1px solid #cbd5e1;

  border-radius:16px;

  padding:0 16px;

  font-size:14px;

}

/* =====================================================
   FORM CARD
===================================================== */

.recipe-form-card{

  margin-top:24px;

  background:white;

  border-radius:28px;

  padding:24px;

  box-shadow:
  0 10px 30px rgba(0,0,0,.05);

}

.card-title{

  font-size:24px;

  font-weight:800;

  margin-bottom:24px;

}

/* =====================================================
   FORM
===================================================== */

.recipe-form{

  display:grid;

  grid-template-columns:
  repeat(2,1fr);

  gap:18px;

}

.recipe-form input,
.recipe-form select{

  height:58px;

  border:1px solid #cbd5e1;

  border-radius:16px;

  padding:0 18px;

  font-size:14px;

}

.recipe-form textarea{

  grid-column:span 2;

  height:120px;

  border:1px solid #cbd5e1;

  border-radius:16px;

  padding:18px;

  resize:none;

  font-size:14px;

}

/* =====================================================
   INGREDIENT TABLE
===================================================== */

.ingredient-table-card{

  margin-top:24px;

  background:white;

  border-radius:28px;

  padding:24px;

  overflow-x:auto;

  box-shadow:
  0 10px 30px rgba(0,0,0,.05);

}

.table-title{

  font-size:24px;

  font-weight:800;

  margin-bottom:24px;

}

.ingredient-table{

  min-width:1000px;

}

.ingredient-header{

  display:grid;

  grid-template-columns:
  2fr .8fr .8fr .9fr .9fr .9fr 1fr;

  gap:14px;

  padding:18px;

  border-radius:18px;

  background:#eff6ff;

  color:#2563eb;

  font-weight:800;

}

.ingredient-row{

  display:grid;

  grid-template-columns:
  2fr .8fr .8fr .9fr .9fr .9fr 1fr;

  gap:14px;

  padding:18px;

  align-items:center;

  border-bottom:1px solid #e2e8f0;

}

/* =====================================================
   SUMMARY GRID
===================================================== */

.summary-grid{

  margin-top:24px;

  display:grid;

  grid-template-columns:
  repeat(3,1fr);

  gap:22px;

}

.summary-card{

  background:white;

  border-radius:24px;

  padding:24px;

  box-shadow:
  0 10px 24px rgba(0,0,0,.05);

}

.summary-card span{

  color:#64748b;

  font-size:14px;

}

.summary-card h2{

  margin-top:12px;

  font-size:38px;

  font-weight:900;

  color:#0f172a;

}

.profit-summary{

  background:#dcfce7;

}

.selling-summary{

  background:#dbeafe;

}

/* =====================================================
   QUICK ACTIONS
===================================================== */

.quick-action-grid{

  margin-top:24px;

  display:grid;

  grid-template-columns:
  repeat(3,1fr);

  gap:20px;

}

.quick-btn{

  border:none;

  height:64px;

  border-radius:20px;

  background:white;

  font-size:15px;

  font-weight:800;

  cursor:pointer;

  transition:.3s;

  box-shadow:
  0 10px 24px rgba(0,0,0,.05);

}

.quick-btn:hover{

  transform:translateY(-2px);

  background:#eff6ff;

}

/* =====================================================
   MODULE GRID
===================================================== */

.module-grid{

  margin-top:24px;

  display:grid;

  grid-template-columns:
  repeat(4,1fr);

  gap:22px;

}

.module-card{

  background:white;

  border-radius:24px;

  padding:24px;

  box-shadow:
  0 10px 30px rgba(0,0,0,.05);

}

.module-card h3{

  font-size:22px;

  margin-bottom:14px;

}

.module-card p{

  color:#64748b;

  line-height:1.7;

}

/* =====================================================
   RESPONSIVE
===================================================== */

@media(max-width:1400px){

  .kpi-grid,
  .summary-grid{

    grid-template-columns:
    repeat(2,1fr);

  }

  .module-grid{

    grid-template-columns:
    repeat(2,1fr);

  }

}

@media(max-width:1200px){

  .filter-section{

    grid-template-columns:
    repeat(2,1fr);

  }

  .quick-action-grid{

    grid-template-columns:
    repeat(2,1fr);

  }

}

@media(max-width:768px){

  .recipe-topbar{

    flex-direction:column;

    align-items:flex-start;

  }

  .filter-section,
  .recipe-form,
  .summary-grid,
  .quick-action-grid,
  .module-grid{

    grid-template-columns:1fr;

  }

  .recipe-form textarea{

    grid-column:span 1;

  }

  .kpi-grid{

    grid-template-columns:1fr;

  }

}

</style>
