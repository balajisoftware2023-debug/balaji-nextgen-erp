<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{

  background:#f1f5f9;

  overflow-x:hidden;

  color:#0f172a;

}

/* =====================================================
   PAGE
===================================================== */

.restaurant-settings-page{

  padding:24px;

  min-height:100vh;

}

/* =====================================================
   TOPBAR
===================================================== */

.settings-topbar{

  background:white;

  border-radius:28px;

  padding:24px;

  display:flex;

  justify-content:space-between;

  align-items:center;

  gap:20px;

  box-shadow:
  0 10px 30px rgba(0,0,0,.05);

}

.top-left h1{

  font-size:38px;

  font-weight:800;

}

.top-left p{

  margin-top:8px;

  color:#64748b;

}

.top-right{

  display:flex;

  gap:14px;

  flex-wrap:wrap;

}

/* =====================================================
   ACTION BUTTONS
===================================================== */

.action-btn{

  border:none;

  padding:14px 20px;

  border-radius:16px;

  color:white;

  font-size:14px;

  font-weight:700;

  cursor:pointer;

  transition:.3s;

}

.action-btn:hover{

  transform:translateY(-2px);

}

.save-btn{

  background:#2563eb;

}

.backup-btn{

  background:#10b981;

}

.sync-btn{

  background:#7c3aed;

}

/* =====================================================
   SETTINGS CARDS
===================================================== */

.settings-card-grid{

  margin-top:24px;

  display:grid;

  grid-template-columns:
  repeat(4,1fr);

  gap:22px;

}

.settings-card{

  border-radius:28px;

  padding:24px;

  color:white;

  box-shadow:
  0 10px 24px rgba(0,0,0,.08);

}

.settings-card h2{

  font-size:24px;

  margin-bottom:14px;

}

.settings-card p{

  line-height:1.7;

  opacity:.95;

}

.branch-card{

  background:
  linear-gradient(
    135deg,
    #2563eb,
    #1d4ed8
  );

}

.tax-card{

  background:
  linear-gradient(
    135deg,
    #10b981,
    #059669
  );

}

.printer-card{

  background:
  linear-gradient(
    135deg,
    #f97316,
    #ea580c
  );

}

.pos-card{

  background:
  linear-gradient(
    135deg,
    #7c3aed,
    #6d28d9
  );

}

/* =====================================================
   COMMON CARD
===================================================== */

.settings-form-card,
.billing-settings-card,
.printer-settings-card,
.security-card,
.theme-settings-card{

  margin-top:24px;

  background:white;

  border-radius:28px;

  padding:24px;

  box-shadow:
  0 10px 30px rgba(0,0,0,.05);

}

.card-title{

  font-size:24px;

  font-weight:800;

  margin-bottom:24px;

}

/* =====================================================
   FORM
===================================================== */

.settings-form{

  display:grid;

  grid-template-columns:
  repeat(2,1fr);

  gap:18px;

}

.settings-form input{

  height:58px;

  border:1px solid #cbd5e1;

  border-radius:16px;

  padding:0 18px;

  font-size:14px;

}

.settings-form textarea{

  grid-column:span 2;

  height:120px;

  border:1px solid #cbd5e1;

  border-radius:16px;

  padding:18px;

  resize:none;

  font-size:14px;

}

/* =====================================================
   BILLING GRID
===================================================== */

.billing-grid{

  display:grid;

  grid-template-columns:
  repeat(5,1fr);

  gap:18px;

}

.setting-item{

  display:flex;

  flex-direction:column;

  gap:10px;

}

.setting-item span{

  font-weight:700;

}

.setting-item input,
.setting-item select{

  height:56px;

  border:1px solid #cbd5e1;

  border-radius:16px;

  padding:0 16px;

}

/* =====================================================
   PRINTER GRID
===================================================== */

.printer-grid{

  display:grid;

  grid-template-columns:
  repeat(4,1fr);

  gap:20px;

}

.printer-box{

  background:#f8fafc;

  border-radius:22px;

  padding:22px;

}

.printer-box h3{

  margin-bottom:16px;

}

.printer-box select,
.printer-box input{

  width:100%;

  height:56px;

  border:1px solid #cbd5e1;

  border-radius:16px;

  padding:0 16px;

}

/* =====================================================
   SECURITY GRID
===================================================== */

.security-grid{

  display:grid;

  grid-template-columns:
  repeat(4,1fr);

  gap:20px;

}

.security-box{

  background:#f8fafc;

  border-radius:22px;

  padding:22px;

}

.security-box h3{

  margin-bottom:16px;

}

.security-box select{

  width:100%;

  height:56px;

  border:1px solid #cbd5e1;

  border-radius:16px;

  padding:0 16px;

}

/* =====================================================
   THEME GRID
===================================================== */

.theme-grid{

  display:grid;

  grid-template-columns:
  repeat(4,1fr);

  gap:20px;

}

.theme-box{

  background:#f8fafc;

  border-radius:22px;

  padding:22px;

}

.theme-box h3{

  margin-bottom:16px;

}

.theme-box input,
.theme-box select{

  width:100%;

  height:56px;

  border:1px solid #cbd5e1;

  border-radius:16px;

  padding:0 16px;

}

/* =====================================================
   QUICK ACTIONS
===================================================== */

.quick-action-grid{

  margin-top:24px;

  display:grid;

  grid-template-columns:
  repeat(3,1fr);

  gap:20px;

}

.quick-btn{

  border:none;

  height:64px;

  border-radius:20px;

  background:white;

  font-size:15px;

  font-weight:800;

  cursor:pointer;

  transition:.3s;

  box-shadow:
  0 10px 24px rgba(0,0,0,.05);

}

.quick-btn:hover{

  transform:translateY(-2px);

  background:#eff6ff;

}

/* =====================================================
   RESPONSIVE
===================================================== */

@media(max-width:1400px){

  .settings-card-grid,
  .printer-grid,
  .security-grid,
  .theme-grid{

    grid-template-columns:
    repeat(2,1fr);

  }

  .billing-grid{

    grid-template-columns:
    repeat(3,1fr);

  }

}

@media(max-width:1200px){

  .quick-action-grid{

    grid-template-columns:
    repeat(2,1fr);

  }

}

@media(max-width:768px){

  .settings-topbar{

    flex-direction:column;

    align-items:flex-start;

  }

  .settings-card-grid,
  .settings-form,
  .billing-grid,
  .printer-grid,
  .security-grid,
  .theme-grid,
  .quick-action-grid{

    grid-template-columns:1fr;

  }

  .settings-form textarea{

    grid-column:span 1;

  }

}

</style>
